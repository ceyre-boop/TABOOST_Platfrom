name: Auto Update Creator Data

on:
  push:
    paths:
      - 'data/*.csv'
  workflow_dispatch:

concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Process current creator snapshot
      run: |
        # update-data.js parses columns by fixed position matching data/current.csv's
        # schema (Host, 7/1, Level, Month, ... Days, Day Pace, Days Goal, Hours, Hrs Goal, ...).
        # This must stay pinned to current.csv specifically — picking "whichever CSV was
        # touched most recently" (the previous `ls -t data/*.csv` approach) is unsafe:
        # actions/checkout does not preserve per-file commit timestamps, so it can silently
        # select a differently-shaped CSV (history.csv, agents.csv, campaigns.csv, etc.) and
        # positional-column parsing will produce garbage creator data with no error raised.
        node update-data.js data/current.csv
        
    - name: Regenerate creator_trends.json from history
      run: |
        python convert_history_csv.py data/history.csv data/creator_trends.json

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # js/data.js and data/creator_trends.json are fully regenerated on every run,
        # not hand-edited — so if two runs race, a rebase/merge will hit real content
        # conflicts (both sides changed the same lines differently) that can't be
        # auto-resolved. The correct recovery is to discard our stale commit, reset to
        # whatever landed on main, and regenerate both files fresh from the CSVs that
        # are now current — never merge two generated versions together.
        for i in 1 2 3 4 5; do
          git add js/data.js data/creator_trends.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update creator data from CSV"
          if git push; then
            echo "Pushed successfully"
            exit 0
          fi
          echo "Push rejected (attempt $i) — resetting to latest main and regenerating from current CSVs"
          git reset --hard HEAD^
          git fetch origin main
          git reset --hard origin/main
          node update-data.js data/current.csv
          python convert_history_csv.py data/history.csv data/creator_trends.json
        done
        echo "::error::Failed to push after 5 retries"
        exit 1

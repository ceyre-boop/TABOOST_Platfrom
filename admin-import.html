        window.importCreators = async () => {
            const btn = document.getElementById('importBtn');
            const log = document.getElementById('log');
            
            btn.disabled = true;
            log.innerHTML = '<p class="info">Starting import...</p>';
            
            let imported = 0;
            let skipped = 0;
            let errors = 0;
            
            for (const creator of creators) {
                try {
                    const docRef = doc(db, 'creatorRoster', creator.username.toLowerCase());
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        log.innerHTML += `<p class="info">⏭️ Skipped (exists): ${creator.username}</p>`;
                        skipped++;
                    } else {
                        await setDoc(docRef, {
                            cid: creator.cid,
                            tiktokUsername: creator.username.toLowerCase(),
                            claimed: creator.claimed || false,
                            manager: creator.manager.toUpperCase(),
                            importedAt: new Date().toISOString()
                        });
                        log.innerHTML += `<p class="success">✅ Imported: ${creator.username}</p>`;
                        imported++;
                    }
                } catch (error) {
                    log.innerHTML += `<p class="error">❌ Error with ${creator.username}: ${error.message}</p>`;
                    errors++;
                }
                
                // Scroll to bottom
                log.scrollTop = log.scrollHeight;
            }
            
            log.innerHTML += `<p class="info">\n🎉 Import complete! Imported: ${imported}, Skipped: ${skipped}, Errors: ${errors}</p>`;
            btn.disabled = false;
        };

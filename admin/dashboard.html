<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TABOOST CEO Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --card-2: #161616;
      --card-3: #1c1c1c;
      --accent: #FF0050;
      --red: #FF0050;
      --green: #00C896;
      --yellow: #FFB800;
      --text: #ffffff;
      --secondary: #888888;
      --muted: #5f5f5f;
      --line: #242424;
      --line-strong: #343434;
      --font: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
    }

    body::selection {
      background: rgba(255,0,80,0.34);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 76px;
      padding: 14px 24px;
      background: linear-gradient(90deg, rgba(10,10,10,0.95) 0%, rgba(20,17,24,0.95) 50%, rgba(10,10,10,0.95) 100%);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(255,0,80,0.12);
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    header h1 {
      margin: 0;
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0;
    }

    header p {
      margin: 4px 0 0;
      color: var(--secondary);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .delorean-quote {
      flex: 1;
      max-width: 620px;
      color: #555;
      font-size: 0.78rem;
      font-weight: 500;
      font-style: italic;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #dashboardContent {
      padding: 22px;
    }

    .division-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    @media (min-width: 1024px) {
      .division-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .division-card {
      min-width: 0;
      min-height: 320px;
      padding: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 3px solid rgba(255,0,80,0.25);
      border-radius: 12px;
      box-shadow: var(--shadow);
      transition: border-color .18s ease, transform .18s ease, background .18s ease;
    }

    .division-card:hover {
      border-left-color: var(--accent);
      background: #121212;
      transform: translateY(-1px);
    }

    /* status-driven accents set by JS */
    .division-card.healthy { border-left-color: var(--green); }
    .division-card.warning { border-left-color: var(--yellow); }
    .division-card.offline { border-left-color: var(--muted); }

    .division-card h2 {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      flex: 0 0 8px;
      background: var(--secondary);
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 14px;
    }

    .kpi-card {
      min-height: 78px;
      padding: 10px;
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .kpi-label {
      display: block;
      margin-bottom: 7px;
      color: var(--secondary);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .kpi-value {
      display: block;
      color: var(--text);
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .kpi-sub {
      display: block;
      margin-top: 5px;
      color: var(--secondary);
      font-size: 0.7rem;
      font-weight: 600;
    }

    @keyframes skeleton-pulse {0%,100%{opacity:.4}50%{opacity:.8}}

    .skeleton-bar {
      height: 20px;
      background: #333;
      border-radius: 4px;
      margin: 8px 0;
      animation: skeleton-pulse 1.5s infinite;
    }

    .gpt-alerts {
      min-height: 92px;
      padding: 12px;
      background: #0d0d0d;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.82rem;
    }

    .alert-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 0 0 8px;
      color: #dddddd;
      font-weight: 600;
    }

    .alert-line:last-child {
      margin-bottom: 0;
    }

    .alert-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      margin-top: 6px;
      border-radius: 50%;
    }

    .gpt-center-section {
      grid-column: 1 / -1;
      position: relative;
      padding: 22px 18px 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .gpt-center-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .gpt-center-section h2,
    .gpt-center-section h3 {
      margin: 0 0 12px;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .starter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 10px;
      background: var(--card-2);
      color: #d6d6d6;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, color .18s ease, background .18s ease;
    }

    .chip:hover,
    .chip:focus-visible {
      background: #181818;
      color: var(--text);
      border-color: var(--accent);
      outline: none;
    }

    #gptInput {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 12px;
      background: #0b0b0b;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    #gptInput:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(255,0,80,0.14);
    }

    #gptConversation {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .conversation-card,
    #gptConversation .message-card {
      padding: 12px;
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 0.85rem;
    }

    .conversation-card.user,
    #gptConversation .message-card.user {
      border-left: 3px solid var(--accent);
    }

    .conversation-card.assistant,
    #gptConversation .message-card.assistant {
      border-left: 3px solid var(--green);
    }

    .placeholder-card {
      padding: 14px;
      background: #0d0d0d;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--secondary);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .discord-compose-card,
    .discord-preview-card {
      padding: 14px;
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .discord-compose-card label,
    .discord-preview-card label {
      display: block;
      margin-bottom: 6px;
      color: var(--secondary);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .discord-compose-card textarea,
    .discord-compose-card input,
    .discord-compose-card select {
      width: 100%;
      min-height: 38px;
      padding: 9px 10px;
      background: #0b0b0b;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.85rem;
    }

    .discord-compose-card textarea {
      min-height: 110px;
      resize: vertical;
    }

    .discord-preview-card {
      white-space: pre-wrap;
      color: #e6e6e6;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9998;
      min-width: 230px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      background: var(--card-2);
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-left: 4px solid var(--green);
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .toast.success {
      border-left-color: var(--green);
    }

    .toast.error {
      border-left-color: var(--red);
    }

    button,
    .button,
    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      background: var(--accent);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    button:hover,
    .button:hover,
    .link-button:hover {
      background: #d90043;
      border-color: #d90043;
      transform: translateY(-1px);
    }

    button.secondary,
    .button.secondary,
    .link-button.secondary {
      background: var(--card-2);
      color: #e8e8e8;
      border-color: var(--line-strong);
    }

    button.secondary:hover,
    .button.secondary:hover,
    .link-button.secondary:hover {
      background: #1d1d1d;
      border-color: var(--accent);
    }

    a {
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
    }

    a:hover {
      color: var(--accent);
    }

    .division-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 13px;
    }

    .division-link {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      color: #e9e9e9;
      border-bottom: 1px solid rgba(255,255,255,0.18);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .division-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0d0d0d;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.78rem;
    }

    thead {
      background: #171717;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      color: #dedede;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--secondary);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    td strong {
      color: var(--text);
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.025);
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .deals-table,
    .deal-table {
      margin-top: 12px;
    }

    .deal-stage {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      background: rgba(255,184,0,0.12);
      color: var(--yellow);
      border: 1px solid rgba(255,184,0,0.22);
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .metric-row:last-child {
      border-bottom: 0;
    }

    .metric-row span:first-child {
      color: var(--secondary);
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-row span:last-child {
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 800;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .ai-note {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(0,200,150,0.08);
      border: 1px solid rgba(0,200,150,0.18);
      border-radius: 8px;
      color: #dff9f2;
      font-size: 0.82rem;
      font-weight: 650;
    }

    .error-card {
      padding: 12px;
      background: rgba(255,0,80,0.08);
      border: 1px solid rgba(255,0,80,0.25);
      border-radius: 8px;
      color: #ffdbe6;
      font-size: 0.84rem;
      font-weight: 700;
    }

    @media (max-width: 920px) {
      header {
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .delorean-quote {
        order: 3;
        flex: 1 0 100%;
        max-width: none;
        text-align: left;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      header {
        padding: 12px 14px;
      }

      #dashboardContent {
        padding: 14px;
      }

      .division-card,
      .gpt-center-section {
        padding: 14px;
      }

      .kpi-grid {
        grid-template-columns: 1fr;
      }

      button,
      .button,
      .link-button {
        width: 100%;
      }

      .division-links {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <span id="gigawattsText" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#FF0050; color:#fff; padding:8px 16px; border-radius:8px; z-index:9999; font-weight:700; font-size:1.1rem;">⚡ 1.21 Gigawatts!</span>
  <header>
    <div class="header-left">
      <img id="taboostLogo" src="../images/taboost-genie.jpg" alt="TABOOST" style="height:48px; width:48px; object-fit:cover; cursor:pointer; border-radius:10px;" onclick="deloreanEasterEgg()">
      <div>
        <h1 id="greeting">Good morning, Marco</h1>
        <p id="currentDate"></p>
      </div>
    </div>
    <div id="deloreanQuote" class="delorean-quote"></div>
    <button type="button" onclick="auth.signOut().then(()=>location.href='../firebase-login.html')">Sign Out</button>
  </header>
  <div id="dashboardContent" style="display:none;">
    <div class="division-grid">
      <section class="division-card" id="liveDivision">
        <h2><span class="status-dot" id="liveDot" style="background:#888;width:8px;height:8px;border-radius:50%;"></span>🔴 LIVE (US)</h2>
        <div class="kpi-grid">
          <div class="kpi-card" id="liveCreators"><div class="skeleton-bar"></div></div>
          <div class="kpi-card" id="liveDiamonds"><div class="skeleton-bar"></div></div>
          <div class="kpi-card" id="liveRevenue"><div class="skeleton-bar"></div></div>
          <div class="kpi-card" id="liveScore"><div class="skeleton-bar"></div></div>
          <div class="kpi-card" id="liveLevel5"><div class="skeleton-bar"></div></div>
        </div>
        <div class="gpt-alerts" id="liveAlerts"><div class="skeleton-bar"></div><div class="skeleton-bar" style="width:80%"></div></div>
        <div class="division-links">
          <a class="division-link" href="../dashboard.html">View Full Live Dashboard →</a>
          <a class="division-link" href="../uk/index.html">View UK Dashboard →</a>
        </div>
      </section>
      <section class="division-card" id="shopDivision">
        <h2><span class="status-dot" id="shopDot"></span>🛍️ SHOP</h2>
        <div id="shopBody">
          <div class="skeleton-bar"></div>
          <div class="skeleton-bar"></div>
          <div class="skeleton-bar" style="width:80%"></div>
        </div>
        <div class="division-links">
          <a class="division-link" href="../shop/index.html">View Shop Dashboard →</a>
        </div>
      </section>
      <!-- DIVISION GRID CONTINUES IN PART 2 -->
  <script>
    /*
      REPLACE_ME_OPENAI_KEY: Enables GPT-powered KPI insights, executive summaries, and command responses.
      REPLACE_ME_SUPABASE_URL: Enables Supabase-backed data access for divisions or utilities appended in part 2.
      REPLACE_ME_SUPABASE_ANON_KEY: Enables authenticated anonymous Supabase browser reads for part 2 features.
      REPLACE_ME_MONDAY_TOKEN: Enables Monday.com board reads and deal pipeline summaries.
      REPLACE_ME_MONDAY_BOARD_ID: Selects the Monday.com board used for Monday division KPIs.
      REPLACE_ME_DISCORD_ANNOUNCEMENTS: Enables announcement-channel Discord webhook posting.
      REPLACE_ME_DISCORD_MANAGERS: Enables manager-channel Discord webhook posting.
      REPLACE_ME_DISCORD_TALENT_GENERAL: Enables talent-general Discord webhook posting.
    */
    const firebaseConfig = { apiKey:"AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE", authDomain:"taboost-platform.firebaseapp.com", projectId:"taboost-platform", storageBucket:"taboost-platform.firebasestorage.app", messagingSenderId:"379293685859", appId:"1:379293685859:web:d89592adbf67360b574056" };
    firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
    const OPENAI_KEY = 'REPLACE_ME_OPENAI_KEY';
    let liveKPIs = {}; let shopKPIs = {}; let talentKPIs = {}; let mondayKPIs = {}; let lastGPTResponse = ''; let commandMessages = [];

    function setDot(id, color){
      const el=document.getElementById(id);
      if(el) el.style.background=color;
      // reflect status on the parent division card's left border (presentation only)
      const card = el && el.closest('.division-card');
      if(card){
        card.classList.remove('healthy','warning','offline');
        if(color==='#00C896') card.classList.add('healthy');
        else if(color==='#FFB800') card.classList.add('warning');
        else if(color==='#FF0050') card.classList.add('offline');
      }
    }

    function showToast(msg, type='success'){
      try {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => {
          try { toast.remove(); } catch (err) {}
        }, 3000);
      } catch (err) {}
    }

    function deloreanEasterEgg(){
      const logo = document.getElementById('taboostLogo');
      const gigawatts = document.getElementById('gigawattsText');
      if (logo) {
        logo.style.transition = 'filter .3s';
        logo.style.filter = 'blur(8px) brightness(3)';
        setTimeout(() => { logo.style.filter = 'none'; }, 300);
        setTimeout(() => { logo.style.filter = 'blur(8px) brightness(3)'; }, 400);
        setTimeout(() => { logo.style.filter = 'none'; }, 700);
      }
      if (gigawatts) {
        gigawatts.style.display = 'block';
        setTimeout(() => { gigawatts.style.display = 'none'; }, 2000);
      }
    }

    function updateHeaderContext(){
      try {
        const now = new Date();
        const hour = now.getHours();
        const greetingText = hour < 12 ? 'Good morning, Marco' : hour < 18 ? 'Good afternoon, Marco' : 'Good evening, Marco';
        const dateText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        const quotes = [
          "Roads? Where we're going, we don't need roads.",
          "All systems nominal. Great Scott.",
          "Time circuits: on. Agency: running.",
          "1.21 gigawatts. Right on schedule.",
          "Your density has brought you here, Marco.",
          "The future is whatever you make it, so make it a good one."
        ];
        const greeting = document.getElementById('greeting');
        const currentDate = document.getElementById('currentDate');
        const quote = document.getElementById('deloreanQuote');
        if (greeting) greeting.textContent = greetingText;
        if (currentDate) currentDate.textContent = dateText;
        if (quote) quote.textContent = quotes[Math.floor(Math.random() * quotes.length)];
      } catch (err) {}
    }
    updateHeaderContext();

    async function callGPT(systemPrompt, userPrompt){
      try {
        if (!OPENAI_KEY || OPENAI_KEY === 'REPLACE_ME_OPENAI_KEY') return null;
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4o',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            max_tokens: 400
          })
        });
        if (!response?.ok) return null;
        const data = await response.json();
        return data?.choices?.[0]?.message?.content?.trim() || null;
      } catch (err) {
        return null;
      }
    }

    async function parseCSV(url){
      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response?.ok) throw new Error(`CSV load failed: ${response.status}`);
        const text = await response.text();
        const rows = [];
        let row = [];
        let field = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const next = text[i + 1];
          if (char === '"' && inQuotes && next === '"') {
            field += '"';
            i++;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            row.push(field);
            field = '';
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && next === '\n') i++;
            row.push(field);
            if (row.some(cell => cell !== '')) rows.push(row);
            row = [];
            field = '';
          } else {
            field += char;
          }
        }
        if (field.length || row.length) {
          row.push(field);
          if (row.some(cell => cell !== '')) rows.push(row);
        }
        return rows;
      } catch (err) {
        throw err;
      }
    }

    function cleanNum(val){
      if (val === null || val === undefined) return 0;
      const cleaned = String(val).replace(/[$,%\s,]/g, '').trim();

    }

    function renderMarkdown(md) {
      const escaped = escapeHTML(md || '');
      const lines = escaped.split('\n');
      let html = '';
      let inList = false;

      lines.forEach((line) => {
        const formatted = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        if (/^###\s+/.test(formatted)) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<h4>${formatted.replace(/^###\s+/, '')}</h4>`;
        } else if (/^##\s+/.test(formatted)) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<h3>${formatted.replace(/^##\s+/, '')}</h3>`;
        } else if (/^#\s+/.test(formatted)) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<h2>${formatted.replace(/^#\s+/, '')}</h2>`;
        } else if (/^[-*]\s+/.test(formatted)) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${formatted.replace(/^[-*]\s+/, '')}</li>`;
        } else if (formatted.trim()) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<p>${formatted}</p>`;
        } else {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += '<br>';
        }
      });

      if (inList) html += '</ul>';
      return html;
    }

    async function submitGPTCommand() {
      const input = document.getElementById('gptInput');
      const q = input?.value?.trim();
      if (!q) return;
      const btn = document.getElementById('gptSubmitBtn');

      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Thinking...';
        }
        commandMessages.push({ role: 'user', content: q });
        appendConversation('user', q);
        input.value = '';
        const ans = await callGPT(buildCommandCenterSystemPrompt(), q);
        const text = ans || 'Connect OPENAI_KEY to enable the Command Center.';
        commandMessages.push({ role: 'assistant', content: text });
        lastGPTResponse = text;
        appendConversation('assistant', text);
      } catch (err) {
        appendConversation('assistant', 'Command Center is unavailable right now.');
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Ask GPT';
        }
      }
    }

    function appendConversation(role, text) {
      const c = document.getElementById('gptConversation');
      if (!c) return;

      if (role === 'user') {
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble user-bubble';
        bubble.style.marginLeft = 'auto';
        bubble.textContent = text;
        c.appendChild(bubble);
        c.scrollTop = c.scrollHeight;
        return;
      }

      const card = document.createElement('div');
      card.className = 'assistant-message';
      card.dataset.raw = text;
      card.innerHTML = `
        <div class="assistant-response">${renderMarkdown(text)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
          <button onclick="copyText(this, this.closest('.assistant-message')?.dataset?.raw || '')">Copy</button>
          <button onclick="prefillDiscord(this.closest('.assistant-message')?.dataset?.raw || '')">Send to Discord</button>
        </div>
      `;
      c.appendChild(card);
      c.scrollTop = c.scrollHeight;
    }

    function clearGPTConversation() {
      commandMessages = [];
      const c = document.getElementById('gptConversation');
      if (c) c.innerHTML = '';
    }

    function copyText(btn, text) {
      navigator.clipboard?.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => showToast('Copy failed', 'error'));
    }

    function prefillDiscord(text) {
      const ta = document.getElementById('discordMessage');
      if (ta) {
        ta.value = text;
        document.getElementById('discordCompose')?.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function previewDiscord() {
      const ch = document.getElementById('discordChannel')?.value;
      const msg = document.getElementById('discordMessage')?.value?.trim();
      if (!msg) {
        showToast('Write a message first', 'error');
        return;
      }
      document.getElementById('discordPreviewChannel').textContent = '#' + ch;
      document.getElementById('discordPreviewBody').textContent = msg;
      document.getElementById('discordCompose').style.display = 'none';
      document.getElementById('discordPreview').style.display = 'block';
    }

    function editDiscord() {
      document.getElementById('discordPreview').style.display = 'none';
      document.getElementById('discordCompose').style.display = 'block';
    }

    function confirmDiscord() {
      const ch = document.getElementById('discordChannel')?.value;
      const msg = document.getElementById('discordMessage')?.value?.trim();
      sendDiscordMessage(ch, msg);
      document.getElementById('discordPreview').style.display = 'none';
      document.getElementById('discordCompose').style.display = 'block';
      document.getElementById('discordMessage').value = '';
    }

    async function sendDiscordMessage(channel, message) {
      try {
        const webhook = DISCORD_WEBHOOKS[channel];
        if (!webhook || webhook.startsWith('REPLACE_ME')) {
          alert('Discord webhook not configured for #' + channel);
          return;
        }
        const resp = await fetch(webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: message,
            username: 'TABOOST HQ'
          })
        });
        if (resp.ok) showToast('Discord message sent');
        else showToast('Discord send failed', 'error');
      } catch (err) {
        showToast('Network error', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderSports();
    });
    renderSports();
  </script>

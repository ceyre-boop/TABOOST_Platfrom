<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TABOOST Command Center</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
iframe { width: 100%; height: 100%; border: none; }
.loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #080808; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100;
  color: #fff; font-family: sans-serif;
}
.spinner {
  width: 50px; height: 50px; border: 3px solid #333;
  border-top-color: #ff0044; border-radius: 50%;
  animation: spin 1s linear infinite; margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }

/* Logout Button */
.logout-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 200;
  background: #ff0044;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 15px rgba(255,0,68,0.3);
  transition: all 0.2s ease;
}
.logout-btn:hover {
  background: #cc0035;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,0,68,0.4);
}
.logout-btn svg {
  width: 16px;
  height: 16px;
}
</style>
</head>
<body>
<!-- Logout Button -->
<button class="logout-btn" onclick="logout()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
    <polyline points="16 17 21 12 16 7"/>
    <line x1="21" y1="12" x2="9" y2="12"/>
  </svg>
  Logout
</button>

<div class="loading" id="loader">
  <div class="spinner"></div>
  <div>Loading Command Center...</div>
</div>
<iframe 
  src="https://cloud.uibakery.io/share/dDit1exVyZ" 
  allow="fullscreen"
  onload="document.getElementById('loader').classList.add('hidden')">
</iframe>

<script>
// ── SECURITY: Admin Authentication Check ──
(function checkAdminAuth(){
  try {
    const user = JSON.parse(localStorage.getItem('taboost_user') || '{}');
    const SESSION_DURATION_MS = 8 * 60 * 60 * 1000; // 8 hours
    
    // Must be logged in AND have admin role
    if (!user || user.role !== 'admin') {
      console.error('❌ ADMIN ACCESS DENIED: Not authenticated as admin');
      window.location.href = 'index.html';
      return;
    }
    
    // Check session expiration
    if (user.loginTime) {
      const sessionAge = Date.now() - user.loginTime;
      if (sessionAge > SESSION_DURATION_MS) {
        console.error('❌ ADMIN SESSION EXPIRED');
        localStorage.removeItem('taboost_user');
        window.location.href = 'index.html';
        return;
      }
    }
    
    console.log('✅ Admin authenticated:', user.username || user.name);
  } catch (err) {
    console.error('❌ ADMIN ACCESS DENIED: Error checking auth', err);
    window.location.href = 'index.html';
  }
})();

function logout() {
  // Clear all user session data
  localStorage.removeItem('taboost_user');
  localStorage.removeItem('taboost_current_user');
  localStorage.removeItem('last_signup_notification');
  // Redirect to login page
  window.location.href = 'index.html';
}
</script>
</body>
</html>

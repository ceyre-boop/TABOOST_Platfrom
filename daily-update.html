<!DOCTYPE html>
<html>
<head>
    <title>TABOOST - Daily Update</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0044, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .drop-zone {
            background: rgba(255,255,255,0.03);
            border: 3px dashed #444;
            border-radius: 20px;
            padding: 60px 40px;
            cursor: pointer;
            margin: 30px 0;
        }
        .drop-zone:hover { border-color: #ff0044; }
        .drop-zone.uploading { border-color: #f59e0b; }
        .drop-zone.done { border-color: #22c55e; }
        .drop-icon { font-size: 48px; margin-bottom: 15px; }
        .drop-text { font-size: 1.2rem; }
        .progress {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .progress.visible { display: block; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0044, #f59e0b);
            width: 0%;
            transition: width 0.2s;
        }
        .log {
            background: #0a0a0a;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .log.visible { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TABOOST</div>
        <p style="color:#888">Daily Data Update</p>
        
        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">📁</div>
            <div class="drop-text">Drop CSV file here</div>
            <input type="file" id="fileInput" accept=".csv" style="display:none">
        </div>
        
        <div class="progress" id="progress">
            <div id="status">Processing...</div>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        </div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progress = document.getElementById('progress');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        dropZone.onclick = () => fileInput.click();
        
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#ff0044'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#444'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#444';
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        };
        
        fileInput.onchange = (e) => { if (e.target.files.length) processFile(e.target.files[0]); };

        function logMsg(msg) {
            log.classList.add('visible');
            const div = document.createElement('div');
            div.textContent = msg;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function processFile(file) {
            if (!file.name.endsWith('.csv')) { logMsg('❌ Not a CSV file'); return; }
            
            dropZone.classList.add('uploading');
            dropZone.innerHTML = '<div class="drop-icon">⏳</div><div class="drop-text">Reading...</div>';
            progress.classList.add('visible');
            
            const text = await file.text();
            const lines = text.split('\n');
            const creators = [];
            
            // Parse CSV
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 3) continue;
                
                const cid = cols[1]?.trim();
                const username = cols[2]?.trim();
                let manager = cols[8]?.trim() || 'carrington';
                if (manager.includes('+')) manager = manager.split('+')[0];
                
                if (cid && username) {
                    creators.push({
                        cid, username: username.toLowerCase(), manager,
                        diamonds: cols[19]?.replace(/,/g, '') || '0',
                        hours: cols[16]?.trim() || '0',
                        days: cols[12]?.trim() || '0',
                        tier: cols[21]?.trim() || '',
                        earned: cols[33]?.replace(/,/g, '') || '0'
                    });
                }
            }
            
            logMsg(`📊 ${creators.length} creators found`);
            
            // Upload to Firebase in batches
            const BATCH_SIZE = 400;
            for (let i = 0; i < creators.length; i += BATCH_SIZE) {
                const batch = db.batch();
                const chunk = creators.slice(i, i + BATCH_SIZE);
                
                for (const c of chunk) {
                    const ref = db.collection('creatorRoster').doc(c.username);
                    batch.set(ref, {
                        cid: c.cid,
                        tiktokUsername: c.username,
                        manager: c.manager.toUpperCase(),
                        diamonds: c.diamonds,
                        hours: c.hours,
                        days: c.days,
                        tier: c.tier,
                        earned: c.earned,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
                
                await batch.commit();
                const pct = Math.round(((i + chunk.length) / creators.length) * 100);
                fill.style.width = pct + '%';
                status.textContent = `${i + chunk.length}/${creators.length}`;
                logMsg(`✓ ${i + chunk.length} done`);
            }
            
            dropZone.classList.remove('uploading');
            dropZone.classList.add('done');
            dropZone.innerHTML = '<div class="drop-icon">✅</div><div class="drop-text">Done!</div>';
            status.textContent = `✅ ${creators.length} creators updated`;
            logMsg('🎉 All data saved to Firebase!');
        }
    </script>
</body>
</html>

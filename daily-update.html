<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABOOST - Daily CSV Update (v2)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0044, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .drop-zone {
            background: rgba(255, 255, 255, 0.03);
            border: 3px dashed #444;
            border-radius: 20px;
            padding: 60px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: #ff0044;
            background: rgba(255, 0, 68, 0.05);
        }
        
        .drop-zone.uploading {
            border-color: #feca57;
            background: rgba(254, 202, 87, 0.05);
        }
        
        .drop-zone.complete {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.05);
        }
        
        .drop-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .drop-text {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .drop-hint {
            color: #666;
            font-size: 0.9rem;
        }
        
        .file-input {
            display: none;
        }
        
        .progress-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: none;
        }
        
        .progress-section.visible {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0044, #feca57);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            color: #888;
            font-size: 0.9rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #feca57;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }
        
        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            display: none;
        }
        
        .status-message.success {
            display: block;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid #4ade80;
            color: #4ade80;
        }
        
        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        
        .log {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        .log.visible {
            display: block;
        }
        
        .log-entry {
            margin: 3px 0;
            color: #888;
        }
        
        .log-entry.success { color: #4ade80; }
        .log-entry.error { color: #ef4444; }
        .log-entry.info { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TABOOST</div>
        <div class="subtitle">Daily Creator Data Update</div>
        
        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">📁</div>
            <div class="drop-text">Drop CSV file here</div>
            <div class="drop-hint">or click to browse</div>
            <input type="file" class="file-input" id="fileInput" accept=".csv">
        </div>
        
        <div class="progress-section" id="progressSection">
            <div class="progress-text" id="progressText">Processing...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="totalStat">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="newStat">0</div>
                    <div class="stat-label">New</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="updatedStat">0</div>
                    <div class="stat-label">Updated</div>
                </div>
            </div>
        </div>
        
        <div class="status-message" id="statusMessage"></div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const statusMessage = document.getElementById('statusMessage');
        const log = document.getElementById('log');

        // Stats
        const totalStat = document.getElementById('totalStat');
        const newStat = document.getElementById('newStat');
        const updatedStat = document.getElementById('updatedStat');

        // Drag & Drop Events
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function logMessage(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        async function handleFile(file) {
            if (!file.name.endsWith('.csv')) {
                showError('Please upload a CSV file');
                return;
            }

            log.classList.add('visible');
            logMessage(`📁 Processing: ${file.name}`, 'info');
            
            dropZone.classList.add('uploading');
            dropZone.innerHTML = `
                <div class="drop-icon">⏳</div>
                <div class="drop-text">Processing...</div>
                <div class="drop-hint">${file.name}</div>
            `;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await processCSV(e.target.result);
                } catch (err) {
                    showError('Error processing file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        async function processCSV(content) {
            const lines = content.split('\n');
            const creators = [];
            
            logMessage(`📊 Parsing ${lines.length} lines...`, 'info');
            
            // Parse CSV (skip header)
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = parseCSVLine(line);
                if (cols.length < 3) continue;
                
                const cid = cols[1]?.trim();
                const username = cols[2]?.trim();
                let manager = cols[8]?.trim() || 'carrington';
                
                // Clean manager
                if (manager.includes('+')) manager = manager.split('+')[0].trim();
                if (!manager || manager.toLowerCase() === 'n/a') manager = 'carrington';
                
                if (cid && username) {
                    // Parse all the daily metrics from CSV
                    creators.push({
                        cid: cid,
                        username: username.toLowerCase(),
                        manager: manager.toLowerCase(),
                        claimed: username.toLowerCase() === 'skylerclarkk',
                        // Daily metrics that change
                        status: cols[3]?.trim() || '',
                        level: cols[4]?.trim() || '',
                        month: cols[5]?.trim() || '',
                        discord: cols[6]?.trim() || '',
                        badge: cols[7]?.trim() || '',
                        newCount: cols[9]?.trim() || '',
                        active: cols[10]?.trim() || '',
                        prorate: cols[11]?.trim() || '',
                        days: cols[12]?.trim() || '',
                        dayPace: cols[13]?.trim() || '',
                        daysGoal: cols[14]?.trim() || '',
                        daysLeft: cols[15]?.trim() || '',
                        hours: cols[16]?.trim() || '',
                        hrsGoal: cols[17]?.trim() || '',
                        hoursLeft: cols[18]?.trim() || '',
                        diamonds: cols[19]?.replace(/,/g, '').trim() || '0',
                        diamondPace: cols[20]?.replace(/,/g, '').trim() || '0',
                        tier: cols[21]?.trim() || '',
                        tierGoal: cols[22]?.replace(/,/g, '').trim() || '0',
                        tierLeft: cols[23]?.replace(/,/g, '').trim() || '0',
                        tierStatus: cols[24]?.trim() || '',
                        tierLM: cols[25]?.trim() || '',
                        grad: cols[26]?.trim() || '',
                        diamondsLast30: cols[27]?.replace(/,/g, '').trim() || '0',
                        score: cols[32]?.trim() || '',
                        earned: cols[33]?.replace(/,/g, '').trim() || '0',
                        gifted: cols[34]?.replace(/,/g, '').trim() || '0',
                        running: cols[35]?.replace(/,/g, '').trim() || '0',
                        multiply: cols[36]?.trim() || '',
                        unlocked: cols[37]?.trim() || '',
                        daysMonth: cols[38]?.trim() || '',
                        hoursMonth: cols[39]?.trim() || '',
                        rewardsMonth: cols[40]?.trim() || '',
                        tiktokLink: cols[41]?.trim() || ''
                    });
                }
            }
            
            logMessage(`✅ Parsed ${creators.length} creators`, 'success');
            
            // Show progress
            progressSection.classList.add('visible');
            totalStat.textContent = creators.length;
            
            // Get existing data from Firebase
            logMessage('🔍 Checking existing data...', 'info');
            const snapshot = await db.collection('creatorRoster').get();
            const existing = {};
            snapshot.forEach(doc => existing[doc.id] = doc.data());
            
            logMessage(`📋 Found ${Object.keys(existing).length} creators in Firebase`, 'info');
            
            // DEBUG: Show sample comparison for first creator in CSV
            if (creators.length > 0) {
                const first = creators[0];
                const firstExisting = existing[first.username];
                logMessage(`DEBUG SAMPLE: ${first.username}`, 'info');
                logMessage(`  CSV: 💎${first.diamonds}, ⏱️${first.hours}hrs, 📅${first.days}days`, 'info');
                if (firstExisting) {
                    logMessage(`  FB: 💎${firstExisting.diamonds}, ⏱️${firstExisting.hours}hrs, 📅${firstExisting.days}days`, 'info');
                    const dChange = String(firstExisting.diamonds || '') !== String(first.diamonds);
                    const hChange = String(firstExisting.hours || '') !== String(first.hours);
                    logMessage(`  Changes: diamonds=${dChange}, hours=${hChange}`, 'info');
                } else {
                    logMessage(`  Not in Firebase (would be NEW)`, 'info');
                }
            }
            
            // Process updates
            let newCount = 0;
            let updateCount = 0;
            let unchangedCount = 0;
            const BATCH_SIZE = 400;
            
            for (let i = 0; i < creators.length; i += BATCH_SIZE) {
                const batch = db.batch();
                const chunk = creators.slice(i, i + BATCH_SIZE);
                
                for (const creator of chunk) {
                    const ref = db.collection('creatorRoster').doc(creator.username);
                    const exists = existing[creator.username];
                    
                    // Determine if this is new or needs update
                    let isNew = false;
                    let needsUpdate = false;
                    
                    if (!exists) {
                        isNew = true;
                        newCount++;
                    } else {
                        // Check if ANY data changed (including daily metrics)
                        const existingManager = (exists.manager || '').toLowerCase().trim();
                        const csvManager = creator.manager.toLowerCase().trim();
                        
                        // Check key metrics for changes
                        const diamondsChanged = String(exists.diamonds || '') !== String(creator.diamonds);
                        const hoursChanged = String(exists.hours || '') !== String(creator.hours);
                        const daysChanged = String(exists.days || '') !== String(creator.days);
                        const tierChanged = String(exists.tier || '') !== String(creator.tier);
                        const earnedChanged = String(exists.earned || '') !== String(creator.earned);
                        const managerChanged = existingManager !== csvManager;
                        
                        const hasChanges = diamondsChanged || hoursChanged || daysChanged || 
                                          tierChanged || earnedChanged || managerChanged;
                        
                        // DEBUG: Log first few comparisons
                        if (i < 3) {
                            logMessage(`DEBUG ${creator.username}: d=${diamondsChanged}, h=${hoursChanged}, days=${daysChanged}, tier=${tierChanged}, earned=${earnedChanged}`, 'info');
                        }
                        
                        if (hasChanges) {
                            needsUpdate = true;
                            updateCount++;
                            
                            // Log what changed (but not for every single one to avoid spam)
                            if (updateCount <= 10) {
                                let changes = [];
                                if (diamondsChanged) changes.push(`💎 ${exists.diamonds}→${creator.diamonds}`);
                                if (hoursChanged) changes.push(`⏱️ ${exists.hours}→${creator.hours}hrs`);
                                if (daysChanged) changes.push(`📅 ${exists.days}→${creator.days}days`);
                                if (tierChanged) changes.push(`🏆 tier ${exists.tier}→${creator.tier}`);
                                if (earnedChanged) changes.push(`💰 $${exists.earned}→$${creator.earned}`);
                                if (managerChanged) changes.push(`👤 ${exists.manager}→${creator.manager.toUpperCase()}`);
                                
                                logMessage(`🔄 ${creator.username}: ${changes.join(', ')}`, 'info');
                            }
                        } else {
                            unchangedCount++;
                        }
                    }
                    
                    // Always write to Firebase with ALL daily metrics
                    const data = {
                        cid: creator.cid,
                        tiktokUsername: creator.username,
                        claimed: creator.claimed,
                        manager: creator.manager.toUpperCase(),
                        // Daily metrics
                        status: creator.status,
                        level: creator.level,
                        month: creator.month,
                        discord: creator.discord,
                        badge: creator.badge,
                        newCount: creator.newCount,
                        active: creator.active,
                        prorate: creator.prorate,
                        days: creator.days,
                        dayPace: creator.dayPace,
                        daysGoal: creator.daysGoal,
                        daysLeft: creator.daysLeft,
                        hours: creator.hours,
                        hrsGoal: creator.hrsGoal,
                        hoursLeft: creator.hoursLeft,
                        diamonds: creator.diamonds,
                        diamondPace: creator.diamondPace,
                        tier: creator.tier,
                        tierGoal: creator.tierGoal,
                        tierLeft: creator.tierLeft,
                        tierStatus: creator.tierStatus,
                        tierLM: creator.tierLM,
                        grad: creator.grad,
                        diamondsLast30: creator.diamondsLast30,
                        score: creator.score,
                        earned: creator.earned,
                        gifted: creator.gifted,
                        running: creator.running,
                        multiply: creator.multiply,
                        unlocked: creator.unlocked,
                        daysMonth: creator.daysMonth,
                        hoursMonth: creator.hoursMonth,
                        rewardsMonth: creator.rewardsMonth,
                        tiktokLink: creator.tiktokLink,
                        // Timestamps
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    if (isNew) {
                        data.importedAt = firebase.firestore.FieldValue.serverTimestamp();
                    }
                    
                    batch.set(ref, data, { merge: true });
                }
                
                await batch.commit();
                
                const progress = ((i + chunk.length) / creators.length) * 100;
                progressFill.style.width = progress + '%';
                progressText.textContent = `Processing... ${Math.round(progress)}%`;
                newStat.textContent = newCount;
                updatedStat.textContent = updateCount;
                
                logMessage(`✓ ${Math.min(i + BATCH_SIZE, creators.length)}/${creators.length} (${newCount} new, ${updateCount} updated)`, 'success');
                
                await new Promise(r => setTimeout(r, 100));
            }
            
            // Complete
            dropZone.classList.remove('uploading');
            dropZone.classList.add('complete');
            dropZone.innerHTML = `
                <div class="drop-icon">✅</div>
                <div class="drop-text">Update Complete!</div>
                <div class="drop-hint">${newCount} new, ${updateCount} updated, ${unchangedCount} unchanged</div>
            `;
            
            progressText.textContent = 'Complete!';
            
            const msg = `✅ ${newCount} new, ${updateCount} updated, ${unchangedCount} unchanged. All creator dashboards now show latest data!`;
            showSuccess(msg);
            
            logMessage(`🎉 ${msg}`, 'success');
            
            // Reset after 5 seconds
            setTimeout(() => {
                location.reload();
            }, 5000);
        }

        function showSuccess(msg) {
            statusMessage.textContent = msg;
            statusMessage.className = 'status-message success';
        }

        function showError(msg) {
            statusMessage.textContent = msg;
            statusMessage.className = 'status-message error';
            dropZone.classList.remove('uploading');
            logMessage('❌ ' + msg, 'error');
        }
    </script>
</body>
</html>

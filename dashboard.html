<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=app/">
  <title>Redirecting to Command Center...</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #FF0055;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { color: #888; }
    a { color: #FF0055; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading AI Command Center...</p>
    <p><a href="app/">Click here if not redirected</a></p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TABOOST — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;
  --bg2:#0a0a0a;
  --bg3:#111111;
  --bg4:#1a1a1a;
  --red:#ff0044;
  --red2:#cc0035;
  --red3:rgba(255,0,68,0.12);
  --red4:rgba(255,0,68,0.06);
  --green:#00e676;
  --amber:#ffab00;
  --blue:#2979ff;
  --t1:#ffffff;
  --t2:#e0e0e0;
  --t3:#888888;
  --t4:#444444;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.04);
  --rb:rgba(255,0,68,0.25);
  --fd:'Bebas Neue',sans-serif;
  --fm:'DM Mono',monospace;
  --fb:'DM Sans',sans-serif;
  --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--t2);min-height:100vh;display:flex;overflow-x:hidden;font-size:14px}

/* noise */
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ambient glow */
.glow-r{position:fixed;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:var(--red);opacity:0.04;filter:blur(100px);pointer-events:none;z-index:0}
.glow-b{position:fixed;bottom:-200px;left:200px;width:500px;height:500px;border-radius:50%;background:var(--red);opacity:0.025;filter:blur(120px);pointer-events:none;z-index:0}

/* ── SIDEBAR ── */
.sidebar{width:200px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:200}
.logo-wrap{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px;fill:white}
.logo-name{font-family:var(--fd);font-size:22px;letter-spacing:0.1em;color:var(--t1)}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border)}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--t2);outline:none;font-family:var(--fb);transition:border-color 0.2s}
.search-inp:focus{border-color:var(--rb)}
.search-inp::placeholder{color:var(--t4)}
nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section-lbl{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--t4);padding:12px 18px 4px}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;user-select:none;position:relative}
.nav-link:hover{color:var(--t1);background:rgba(255,255,255,0.03)}
.nav-link.active{color:var(--t1);background:rgba(255,0,68,0.08);border-left-color:var(--red)}
.nav-link.active .nav-icon{color:var(--red)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:var(--fm)}
.nav-badge.g{background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3)}
.sidebar-user{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;color:#fff;flex-shrink:0}
.user-n{font-size:13px;font-weight:600;color:var(--t1)}
.user-r{font-size:10px;color:var(--t4)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;z-index:1}
.topbar{height:54px;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:100}
.tb-title{font-family:var(--fd);font-size:18px;letter-spacing:0.06em;color:var(--t1);flex:1}
.tb-live{display:flex;align-items:center;gap:6px}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
.tb-txt{font-family:var(--fm);font-size:10px;color:var(--green);letter-spacing:0.1em}
.tb-clock{font-family:var(--fm);font-size:11px;color:var(--t4);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px}
.tb-btn{padding:7px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.06em;cursor:pointer;border:1px solid;font-family:var(--fb);transition:all 0.15s}
.tb-btn-red{background:var(--red);border-color:var(--red);color:#fff}
.tb-btn-red:hover{background:var(--red2)}
.tb-btn-ghost{background:transparent;border-color:var(--border);color:var(--t3)}
.tb-btn-ghost:hover{color:var(--t1);border-color:rgba(255,255,255,0.15)}

.content{padding:20px 24px;display:flex;flex-direction:column;gap:20px}
.page{display:none}.page.active{display:flex;flex-direction:column;gap:20px}

/* ── GRID ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.g31{display:grid;grid-template-columns:3fr 1fr;gap:14px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:14px}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s}
.card:hover{border-color:rgba(255,0,68,0.2);box-shadow:0 0 20px rgba(255,0,68,0.04)}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:var(--fd);font-size:13px;letter-spacing:0.1em;color:var(--t1)}
.card-sub{font-size:10px;color:var(--t4);margin-top:2px}
.card-bd{padding:18px}

/* ── KPI TILES ── */
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:all 0.2s;cursor:default}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);opacity:0}
.kpi:hover::before{opacity:1}
.kpi:hover{border-color:rgba(255,0,68,0.25);box-shadow:0 4px 24px rgba(255,0,68,0.06)}
.kpi-icon{font-size:18px;margin-bottom:12px;opacity:0.8}
.kpi-val{font-family:var(--fd);font-size:36px;letter-spacing:0.02em;color:var(--t1);line-height:1}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--t4);margin:6px 0 4px}
.kpi-sub{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.kpi-corner{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}

/* ── LIVE P&L BAR ── */
.pnl-bar{background:linear-gradient(90deg,var(--red),transparent);height:3px;border-radius:2px;margin-top:10px;animation:shimmer 3s ease-in-out infinite}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{font-family:var(--fm);font-size:9px;font-weight:500;color:var(--t4);letter-spacing:0.12em;text-transform:uppercase;padding:9px 12px;text-align:left;white-space:nowrap}
td{padding:10px 12px;font-size:12px;color:var(--t2);border-bottom:1px solid var(--border2);vertical-align:middle}
tbody tr{transition:background 0.1s;cursor:pointer}
tbody tr:hover{background:rgba(255,0,68,0.04)}
tbody tr:last-child td{border-bottom:none}

/* ── CREATOR CELL ── */
.cc{display:flex;align-items:center;gap:9px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;color:#fff;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}
.cn{font-size:12px;font-weight:600;color:var(--t1)}
.ch2{font-size:10px;color:var(--t4);margin-top:1px}

/* ── TIER CHIP ── */
.tc{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:4px;font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:0.05em}
.t6{background:rgba(255,0,68,0.15);color:var(--red);border:1px solid rgba(255,0,68,0.3)}
.t5{background:rgba(255,171,0,0.12);color:var(--amber);border:1px solid rgba(255,171,0,0.3)}
.t4{background:rgba(41,121,255,0.12);color:#64b5f6;border:1px solid rgba(41,121,255,0.3)}
.t3{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.25)}
.t2{background:rgba(255,255,255,0.07);color:var(--t3);border:1px solid var(--border)}
.t1{background:rgba(255,255,255,0.04);color:var(--t4);border:1px solid var(--border2)}

/* ── SCORE BAR ── */
.sb{display:flex;align-items:center;gap:7px}
.sb-num{font-family:var(--fm);font-size:11px;width:24px;text-align:right}
.sb-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;min-width:40px}
.sb-fill{height:100%;border-radius:2px}

/* ── PROGRESS BAR ── */
.pb{background:var(--bg4);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}

/* ── ACCOUNT HEALTH CARD (prop-firm style) ── */
.health-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.health-card::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:var(--r)}
.health-card.healthy::after{box-shadow:inset 0 0 0 1px rgba(0,230,118,0.2)}
.health-card.warning::after{box-shadow:inset 0 0 0 1px rgba(255,171,0,0.3)}
.health-card.critical::after{box-shadow:inset 0 0 0 1px rgba(255,0,68,0.4)}
.health-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.health-name{font-size:12px;font-weight:600;color:var(--t1)}
.health-tier{font-family:var(--fd);font-size:22px;letter-spacing:0.06em}
.health-diamonds{font-family:var(--fd);font-size:28px;letter-spacing:0.02em;color:var(--t1);margin:6px 0 2px}
.health-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--t4);margin-bottom:10px}
.health-to-tier{font-size:11px;color:var(--t3);margin-top:8px}
.health-to-tier strong{color:var(--t1)}
.pulse-ring{position:absolute;top:14px;right:14px;width:12px;height:12px}
.pulse-ring::before,.pulse-ring::after{content:'';position:absolute;inset:0;border-radius:50%}
.pulse-ring::before{background:var(--green);animation:pulseRing 2s ease-out infinite}
.pulse-ring::after{background:var(--green);border-radius:50%;opacity:0.8;animation:pulseRing 2s ease-out infinite 0.5s}
@keyframes pulseRing{0%{transform:scale(1);opacity:0.8}100%{transform:scale(2.5);opacity:0}}
.pulse-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:var(--green)}

/* ── EQUITY CURVE ── */
.eq-wrap{position:relative}
.eq-label{font-family:var(--fm);font-size:9px;color:var(--t4);margin-bottom:6px;letter-spacing:0.08em}

/* ── MILESTONE BAR (prop-firm style) ── */
.milestone{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px}
.ms-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ms-name{font-size:12px;font-weight:600;color:var(--t1)}
.ms-pct{font-family:var(--fd);font-size:20px;letter-spacing:0.05em}
.ms-details{font-size:11px;color:var(--t3);margin-top:3px}
.ms-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px}
.ms-fill{height:100%;border-radius:3px;position:relative;overflow:hidden}
.ms-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));animation:sweep 2s ease-in-out infinite}
@keyframes sweep{0%,100%{opacity:0}50%{opacity:1}}
.ms-eta{font-family:var(--fm);font-size:10px;color:var(--t4);margin-top:6px}

/* ── ALERT ITEM ── */
.al{display:flex;gap:12px;padding:12px 14px;border-radius:6px;border-left:2px solid;margin-bottom:8px;cursor:pointer;transition:background 0.15s}
.al:hover{background:rgba(255,255,255,0.03)}
.al-c{background:rgba(255,0,68,0.05);border-color:var(--red)}
.al-w{background:rgba(255,171,0,0.04);border-color:var(--amber)}
.al-g{background:rgba(0,230,118,0.04);border-color:var(--green)}
.al-i{background:rgba(255,255,255,0.03);border-color:var(--t4)}
.al-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.al-t{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px}
.al-d{font-size:11px;color:var(--t4);line-height:1.5}

/* ── CHIP ── */
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:0.06em}
.chip-r{background:var(--red3);color:var(--red);border:1px solid var(--rb)}
.chip-g{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.25)}
.chip-a{background:rgba(255,171,0,0.1);color:var(--amber);border:1px solid rgba(255,171,0,0.25)}
.chip-b{background:rgba(41,121,255,0.1);color:#64b5f6;border:1px solid rgba(41,121,255,0.25)}
.chip-g2{background:rgba(255,255,255,0.06);color:var(--t3);border:1px solid var(--border)}

/* ── NUMBER COLORS ── */
.up{color:var(--green)}.dn{color:var(--red)}.flat{color:var(--t3)}
.mono{font-family:var(--fm)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fb-btn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--t4);background:var(--bg3);cursor:pointer;transition:all 0.15s;font-family:var(--fb);letter-spacing:0.04em}
.fb-btn:hover{color:var(--t2);border-color:rgba(255,255,255,0.15)}
.fb-btn.active{color:var(--red);border-color:var(--rb);background:var(--red3)}

/* ── BAR CHART ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--t2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-family:var(--fm);font-size:11px;color:var(--t1);width:70px;text-align:right}

/* ── RANK ── */
.rk{font-family:var(--fd);font-size:16px;color:var(--t4);width:30px}
.rk-1{color:#ffd700}.rk-2{color:#c0c0c0}.rk-3{color:#cd7f32}

/* ── SECTION HEADER ── */
.sec-h{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.sec-title{font-family:var(--fd);font-size:16px;letter-spacing:0.08em;color:var(--t1)}
.sec-sub{font-size:11px;color:var(--t4);margin-top:3px}

/* ── PAG ── */
.pag{display:flex;align-items:center;gap:8px;padding:12px 18px;border-top:1px solid var(--border)}
.pag-btn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--t3);background:var(--bg3);cursor:pointer;transition:all 0.15s}
.pag-btn:hover{color:var(--t1);border-color:rgba(255,255,255,0.15)}
.pag-info{font-family:var(--fm);font-size:10px;color:var(--t4);flex:1;text-align:center}

/* ── TICKER TAPE ── */
.ticker-wrap{background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;height:32px;display:flex;align-items:center}
.ticker-inner{display:flex;gap:0;animation:ticker 40s linear infinite;white-space:nowrap}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 24px;font-family:var(--fm);font-size:10px;border-right:1px solid var(--border);height:32px}
.ticker-name{color:var(--t3)}
.ticker-val{color:var(--t1);font-weight:500}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── SVG CHART ── */
.svg-chart{display:block;overflow:visible}

/* ── INSIGHT BOX ── */
.insight{background:rgba(255,0,68,0.04);border:1px solid rgba(255,0,68,0.15);border-radius:6px;padding:12px 14px;font-size:11px;color:var(--t3);line-height:1.6;margin-top:12px}
.insight strong{color:var(--red)}

/* ── MANAGER CARD ── */
.mgr-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:all 0.2s;position:relative;overflow:hidden}
.mgr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.2s}
.mgr-card:hover{border-color:rgba(255,0,68,0.25)}
.mgr-card:hover::before{opacity:1;background:var(--red)}
.mgr-av{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px;color:#fff;margin-bottom:10px;border:1px solid rgba(255,255,255,0.1)}
.mgr-name{font-family:var(--fd);font-size:16px;letter-spacing:0.06em;color:var(--t1)}
.mgr-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.ms-lbl{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--t4)}
.ms-val{font-family:var(--fd);font-size:18px;letter-spacing:0.03em;color:var(--t1);margin-top:2px}
.mgr-top{margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)}
.mgr-top-lbl{font-size:9px;color:var(--t4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.mgr-top-item{font-size:11px;color:var(--t3);margin-bottom:3px}

/* ── REPORT CARD ── */
.rep-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all 0.2s}
.rep-card:hover{border-color:rgba(255,0,68,0.3);background:rgba(255,0,68,0.03)}
.rep-icon{font-size:28px;margin-bottom:10px}
.rep-title{font-family:var(--fd);font-size:14px;letter-spacing:0.06em;color:var(--t1);margin-bottom:4px}
.rep-sub{font-size:11px;color:var(--t4);margin-bottom:14px}
.rep-btn{width:100%;padding:8px;border-radius:5px;background:var(--red);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:0.08em;cursor:pointer;font-family:var(--fb);transition:background 0.15s}
.rep-btn:hover{background:var(--red2)}

/* ── ANIMATIONS ── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,0,68,0)}50%{box-shadow:0 0 12px 2px rgba(255,0,68,0.15)}}
.fu{animation:fadeUp 0.35s ease both}
.fu1{animation:fadeUp 0.35s 0.05s ease both}
.fu2{animation:fadeUp 0.35s 0.1s ease both}
.fu3{animation:fadeUp 0.35s 0.15s ease both}
.fu4{animation:fadeUp 0.35s 0.2s ease both}
.fu5{animation:fadeUp 0.35s 0.25s ease both}

/* ── DIVIDER ── */
.div-r{height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0.3;margin:16px 0}

/* ── RESPONSIVE ── */
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g3,.g21,.g31{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
@media(max-width:700px){.sidebar{width:52px}.nav-link span,.nav-section-lbl,.logo-name,.sidebar-user .user-n,.sidebar-user .user-r{display:none}}
</style>
</head>
<body>
<div class="glow-r"></div>
<div class="glow-b"></div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="logo-wrap">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div class="logo-name">TABOOST</div>
  </div>
  <div class="search-wrap">
    <input class="search-inp" type="text" placeholder="Search creators..." oninput="globalSearch(this.value)">
  </div>
  <nav>
    <div class="nav-section-lbl">Main</div>
    <div class="nav-link active" onclick="showPage('dashboard',this)"><span class="nav-icon">◈</span><span>Dashboard</span></div>
    <div class="nav-link" onclick="showPage('creators',this)"><span class="nav-icon">◉</span><span>Creators</span><span class="nav-badge g" id="navCreatorCount">--</span></div>
    <div class="nav-link" onclick="showPage('diamonds',this)"><span class="nav-icon">◆</span><span>Diamonds</span></div>
    <div class="nav-link" onclick="showPage('streams',this)"><span class="nav-icon">▶</span><span>Live Streams</span></div>
    <div class="nav-section-lbl">Management</div>
    <div class="nav-link" onclick="showPage('managers',this)"><span class="nav-icon">⊞</span><span>Managers</span></div>
    <div class="nav-link" onclick="showPage('leaderboard',this)"><span class="nav-icon">≡</span><span>Leaderboard</span></div>
    <div class="nav-link" onclick="showPage('health',this)"><span class="nav-icon">♡</span><span>Creator Health</span></div>
    <div class="nav-link" onclick="showPage('milestones',this)"><span class="nav-icon">◎</span><span>Milestones</span></div>
    <div class="nav-section-lbl">Reports</div>
    <div class="nav-link" onclick="showPage('reports',this)"><span class="nav-icon">⊡</span><span>Reports</span></div>
    <div class="nav-link" onclick="showPage('alerts',this)"><span class="nav-icon">⚑</span><span>Alerts</span></div>
    <div class="nav-link" onclick="showPage('settings',this)"><span class="nav-icon">⊙</span><span>Settings</span></div>
  </nav>
  <div class="sidebar-user">
    <div class="user-av">M</div>
    <div><div class="user-n">Marco</div><div class="user-r">Admin</div></div>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-title" id="tb-title">DASHBOARD</div>
    <div class="tb-live"><div class="tb-dot"></div><span class="tb-txt">LIVE</span></div>
    <div class="tb-clock" id="tb-clock">--:--:--</div>
    <button class="tb-btn tb-btn-ghost">↓ EXPORT</button>
    <button class="tb-btn tb-btn-red" onclick="logout()">LOGOUT</button>
  </div>

  <!-- TICKER -->
  <div class="ticker-wrap" id="ticker"></div>

  <div class="content" id="main-content">
    <!-- Content loaded dynamically -->
    <div style="text-align:center;padding:100px 20px">
      <i class="fas fa-spinner fa-spin" style="font-size:32px;color:var(--red)"></i>
      <p style="margin-top:20px;color:var(--t4)">Loading agency data...</p>
    </div>
  </div>
</div>

<!-- Load data and render -->
<script src="js/taboost-data.js"></script>
</body>
</html>

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('csvCount').textContent = DAY2_CREATORS.length;

        function log(msg, type='info') {
            const el = document.getElementById('log');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        async function startDay2Update() {
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ UPDATING...';
            
            log(`📅 Starting Day 2 update with ${DAY2_CREATORS.length} creators...`, 'warning');
            
            let updated = 0;
            let added = 0;
            let unchanged = 0;
            const BATCH_SIZE = 400;
            
            for (let i = 0; i < DAY2_CREATORS.length; i += BATCH_SIZE) {
                const batch = db.batch();
                const chunk = DAY2_CREATORS.slice(i, i + BATCH_SIZE);
                
                for (const creator of chunk) {
                    const ref = db.collection('creatorRoster').doc(creator.username);
                    
                    // Check if exists
                    const doc = await ref.get();
                    
                    if (doc.exists) {
                        // Update existing
                        const data = doc.data();
                        const needsUpdate = data.manager !== creator.manager.toUpperCase() || 
                                          data.cid !== creator.cid;
                        
                        if (needsUpdate) {
                            batch.update(ref, {
                                manager: creator.manager.toUpperCase(),
                                cid: creator.cid,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            updated++;
                        } else {
                            unchanged++;
                        }
                    } else {
                        // Add new
                        batch.set(ref, {
                            cid: creator.cid,
                            tiktokUsername: creator.username,
                            claimed: creator.claimed || false,
                            manager: creator.manager.toUpperCase(),
                            importedAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        added++;
                    }
                }
                
                await batch.commit();
                
                const progress = Math.round(((i + chunk.length) / DAY2_CREATORS.length) * 100);
                document.getElementById('progressCount').textContent = progress + '%';
                document.getElementById('updateCount').textContent = (updated + added);
                
                log(`✅ Progress: ${progress}% (${updated} updated, ${added} new, ${unchanged} unchanged)`);
                
                await new Promise(r => setTimeout(r, 300));
            }
            
            log(`🎉 Day 2 update complete!`, 'success');
            log(`📊 Summary: ${added} new, ${updated} updated, ${unchanged} unchanged`, 'success');
            
            btn.textContent = '✅ UPDATE COMPLETE';
        }

        log('📋 Ready. Click "RUN DAY 2 UPDATE" to begin.', 'info');

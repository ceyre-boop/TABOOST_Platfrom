<!DOCTYPE html>
<html>
<head>
    <title>TABOOST - Emergency Data Update</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { color: #feca57; }
        .btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .log {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        textarea {
            width: 100%;
            height: 300px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .warning {
            background: #451a03;
            border: 1px solid #92400e;
            color: #fbbf24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🚨 Emergency Data Update</h1>
    
    <div class="warning">
        <strong>Step 1:</strong> Paste today's CSV data below<br>
        <strong>Step 2:</strong> Click "TEST FIREBASE CONNECTION"<br>
        <strong>Step 3:</strong> If test passes, click "UPDATE ALL DATA"
    </div>

    <h3>📋 Paste CSV Content:</h3>
    <textarea id="csvInput" placeholder="Paste entire CSV here..."></textarea>
    
    <button class="btn" onclick="testConnection()">🔌 TEST FIREBASE CONNECTION</button>
    <button class="btn" onclick="parseAndUpdate()">🚀 UPDATE ALL DATA</button>
    <button class="btn" onclick="clearLog()">🗑️ CLEAR LOG</button>

    <div class="log" id="log"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(msg, type='info') {
            const el = document.getElementById('log');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testConnection() {
            log('🔌 Testing Firebase connection...', 'info');
            try {
                const testDoc = db.collection('_test_').doc('connection');
                await testDoc.set({ test: true, time: new Date() });
                log('✅ Firebase WRITE works!', 'success');
                
                const snap = await testDoc.get();
                if (snap.exists) {
                    log('✅ Firebase READ works!', 'success');
                    log('✅ Connection test PASSED - ready to update!', 'success');
                }
            } catch (e) {
                log(`❌ Connection failed: ${e.message}`, 'error');
                log('⚠️ Check Firestore rules - need write access', 'warning');
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                if (char === '"') {
                    if (inQuotes && nextChar === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else { current += char; }
            }
            result.push(current.trim());
            return result;
        }

        async function parseAndUpdate() {
            const csvText = document.getElementById('csvInput').value;
            if (!csvText.trim()) {
                log('❌ Please paste CSV data first', 'error');
                return;
            }

            log('📊 Parsing CSV...', 'info');
            const lines = csvText.split('\n');
            const creators = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = parseCSVLine(line);
                const cid = cols[1]?.trim();
                const username = cols[2]?.trim();
                let manager = cols[8]?.trim() || 'carrington';
                
                if (manager.includes('+')) manager = manager.split('+')[0].trim();
                if (!manager || manager.toLowerCase() === 'n/a') manager = 'carrington';
                
                if (cid && username) {
                    creators.push({
                        cid: cid,
                        username: username.toLowerCase(),
                        manager: manager.toLowerCase(),
                        claimed: username.toLowerCase() === 'skylerclarkk'
                    });
                }
            }

            log(`✅ Parsed ${creators.length} creators`, 'success');
            
            if (!confirm(`Update ${creators.length} creators in Firebase?`)) {
                log('Cancelled', 'info');
                return;
            }

            // Update in batches
            let updated = 0;
            const BATCH_SIZE = 400;
            
            for (let i = 0; i < creators.length; i += BATCH_SIZE) {
                const batch = db.batch();
                const chunk = creators.slice(i, i + BATCH_SIZE);
                
                for (const c of chunk) {
                    const ref = db.collection('creatorRoster').doc(c.username);
                    batch.set(ref, {
                        cid: c.cid,
                        tiktokUsername: c.username,
                        claimed: c.claimed,
                        manager: c.manager.toUpperCase(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        importedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
                
                try {
                    await batch.commit();
                    updated += chunk.length;
                    log(`✅ ${updated}/${creators.length} updated`, 'success');
                } catch (e) {
                    log(`❌ Batch error: ${e.message}`, 'error');
                }
                
                await new Promise(r => setTimeout(r, 200));
            }
            
            log(`🎉 COMPLETE! ${updated} creators updated`, 'success');
            log('✅ All creator dashboards now show latest data!', 'success');
        }

        log('📋 Ready. Paste CSV and test connection first.', 'info');
    </script>
</body>
</html>

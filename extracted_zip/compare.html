<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Creators - Taboost Agency</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/command-center.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fas fa-magic"></i></div>
                <div class="sidebar-brand"><h2>Tab<span>oost</span></h2></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Overview</span></a>
                    <a href="command-center.html" class="nav-item"><i class="fas fa-rocket"></i><span>Command Center</span></a>
                    <a href="creators.html" class="nav-item"><i class="fas fa-users"></i><span>Creators</span></a>
                    <a href="leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Leaderboard</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Tools</div>
                    <a href="compare.html" class="nav-item active"><i class="fas fa-code-branch"></i><span>Compare</span></a>
                    <a href="achievements.html" class="nav-item"><i class="fas fa-medal"></i><span>Achievements</span></a>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search creators to compare...">
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="clearComparison()"><i class="fas fa-trash"></i></button>
                    <button class="header-btn" onclick="shareComparison()"><i class="fas fa-share-alt"></i></button>
                    <div class="user-profile" onclick="logout()">
                        <div class="user-avatar" id="userAvatar">M</div>
                        <div class="user-info">
                            <div class="user-name" id="userName">Marco</div>
                            <div class="user-role" id="userRole">Admin</div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content fade-in">
                <div class="compare-header">
                    <div>
                        <h1><i class="fas fa-code-branch" style="color: var(--taboost-red);"></i> Creator Comparison</h1>
                        <p style="color: #888;">Compare creators side-by-side with detailed analytics</p>
                    </div>
                    <div class="compare-selector">
                        <select id="creator1Select" class="compare-select">
                            <option value="">Select Creator 1</option>
                        </select>
                        <span class="vs-badge">VS</span>
                        <select id="creator2Select" class="compare-select">
                            <option value="">Select Creator 2</option>
                        </select>
                    </div>
                </div>
                
                <!-- Comparison Grid -->
                <div class="comparison-container" id="comparisonContainer">
                    <div class="empty-state">
                        <i class="fas fa-users" style="font-size: 60px; color: #333; margin-bottom: 20px;"></i>
                        <h3>Select two creators to compare</h3>
                        <p>Use the dropdowns above or search to find creators</p>
                    </div>
                </div>
                
                <!-- Quick Select -->
                <div class="command-card" style="margin-top: 25px;">
                    <div class="card-header">
                        <h3><i class="fas fa-bolt"></i> Quick Compare</h3>
                    </div>
                    <div class="quick-compare-grid" id="quickCompare">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <style>
        .compare-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .compare-header h1 {
            font-size: 28px;
            font-weight: 800;
        }
        
        .compare-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--glass-bg);
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }
        
        .compare-select {
            background: var(--taboost-dark);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            min-width: 200px;
            cursor: pointer;
        }
        
        .vs-badge {
            background: var(--taboost-red);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 12px;
        }
        
        .comparison-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            min-height: 400px;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px;
            color: #666;
        }
        
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
        }
        
        .compare-column {
            padding: 30px;
        }
        
        .compare-column.winner {
            background: rgba(0, 255, 136, 0.05);
        }
        
        .compare-column.loser {
            background: rgba(255, 0, 68, 0.02);
        }
        
        .compare-profile {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .compare-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-red), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            margin: 0 auto 15px;
            position: relative;
        }
        
        .compare-avatar .winner-crown {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 30px;
        }
        
        .compare-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .compare-manager {
            color: #888;
            font-size: 14px;
        }
        
        .compare-stats {
            display: grid;
            gap: 15px;
        }
        
        .compare-stat {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 15px;
        }
        
        .compare-stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .compare-stat-value {
            font-size: 24px;
            font-weight: 800;
        }
        
        .compare-stat-bar {
            height: 4px;
            background: var(--taboost-dark);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .compare-stat-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        .compare-center {
            background: var(--taboost-dark);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 150px;
        }
        
        .compare-metric {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--glass-border);
            width: 100%;
        }
        
        .compare-metric:last-child {
            border-bottom: none;
        }
        
        .compare-metric-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .compare-metric-diff {
            font-size: 14px;
            font-weight: 700;
        }
        
        .compare-metric-diff.positive { color: var(--neon-green); }
        .compare-metric-diff.negative { color: var(--neon-red); }
        
        .compare-chart-container {
            grid-column: 1 / -1;
            padding: 30px;
            border-top: 1px solid var(--glass-border);
        }
        
        .compare-chart {
            height: 300px;
        }
        
        .quick-compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        
        .quick-compare-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .quick-compare-item:hover {
            border-color: var(--taboost-red);
            background: rgba(255, 0, 68, 0.05);
        }
        
        .quick-compare-item.selected {
            border-color: var(--neon-green);
            background: rgba(0, 255, 136, 0.1);
        }
        
        .quick-compare-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .quick-compare-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-red), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .quick-compare-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .quick-compare-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--taboost-red);
        }
    </style>
    
    <script src="js/data.js"></script>
    <script src="js/sheets-data.js"></script>
    <script>
        // Auth
        const user = JSON.parse(localStorage.getItem('taboost_user'));
        if (!user) window.location.href = 'index.html';
        else {
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userRole').textContent = user.role === 'admin' ? 'Admin' : 'Creator';
            document.getElementById('userAvatar').textContent = user.avatar;
        }
        function logout() {
            localStorage.removeItem('taboost_user');
            window.location.href = 'index.html';
        }
        
        let creators = [];
        let selectedCreators = [null, null];
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }
        
        async function init() {
            await taboostData.loadFromCSV();
            creators = taboostData.getAllCreators();
            
            populateSelects();
            populateQuickCompare();
            
            // Check URL params
            const params = new URLSearchParams(window.location.search);
            const c1 = params.get('c1');
            const c2 = params.get('c2');
            if (c1 && c2) {
                document.getElementById('creator1Select').value = c1;
                document.getElementById('creator2Select').value = c2;
                updateComparison();
            }
        }
        
        function populateSelects() {
            const select1 = document.getElementById('creator1Select');
            const select2 = document.getElementById('creator2Select');
            
            creators.forEach(c => {
                const option = `<option value="${c.username}">${c.username} (${formatNumber(c.diamonds)} 💎)</option>`;
                select1.innerHTML += option;
                select2.innerHTML += option;
            });
            
            select1.addEventListener('change', updateComparison);
            select2.addEventListener('change', updateComparison);
        }
        
        function populateQuickCompare() {
            const topCreators = [...creators]
                .sort((a, b) => (b.diamonds || 0) - (a.diamonds || 0))
                .slice(0, 8);
            
            document.getElementById('quickCompare').innerHTML = topCreators.map((c, i) => `
                <div class="quick-compare-item" onclick="selectForCompare('${c.username}', ${i % 2})">
                    <div class="quick-compare-header">
                        <div class="quick-compare-avatar">${c.username.charAt(0)}</div>
                        <div class="quick-compare-name">${c.username}</div>
                    </div>
                    <div class="quick-compare-value">${formatNumber(c.diamonds)} 💎</div>
                </div>
            `).join('');
        }
        
        function selectForCompare(username, slot) {
            if (slot === 0) {
                document.getElementById('creator1Select').value = username;
            } else {
                document.getElementById('creator2Select').value = username;
            }
            updateComparison();
        }
        
        function updateComparison() {
            const c1Name = document.getElementById('creator1Select').value;
            const c2Name = document.getElementById('creator2Select').value;
            
            if (!c1Name || !c2Name) return;
            
            const c1 = creators.find(c => c.username === c1Name);
            const c2 = creators.find(c => c.username === c2Name);
            
            if (!c1 || !c2) return;
            
            // Determine winner
            const c1Total = (c1.diamonds || 0) + (c1.rewards?.earned || 0);
            const c2Total = (c2.diamonds || 0) + (c2.rewards?.earned || 0);
            const c1Wins = c1Total > c2Total;
            
            const stats = [
                { key: 'diamonds', label: 'Diamonds', color: '#ff0044' },
                { key: 'hours', label: 'Hours', color: '#00d4ff' },
                { key: 'rewards', label: 'Rewards', color: '#00ff88', getter: c => c.rewards?.earned },
                { key: 'score', label: 'Score', color: '#ffd700' },
                { key: 'liveStreams', label: 'Streams', color: '#a855f7' }
            ];
            
            const container = document.getElementById('comparisonContainer');
            container.innerHTML = `
                <div class="comparison-grid">
                    <div class="compare-column ${c1Wins ? 'winner' : 'loser'}">
                        <div class="compare-profile">
                            <div class="compare-avatar">
                                ${c1.username.charAt(0)}
                                ${c1Wins ? '<span class="winner-crown">👑</span>' : ''}
                            </div>
                            <div class="compare-name">${c1.username}</div>
                            <div class="compare-manager">${c1.manager || 'Unassigned'}</div>
                        </div>
                        <div class="compare-stats">
                            ${stats.map(s => {
                                const v1 = s.getter ? s.getter(c1) : c1[s.key] || 0;
                                const v2 = s.getter ? s.getter(c2) : c2[s.key] || 0;
                                const max = Math.max(v1, v2) || 1;
                                const pct = (v1 / max) * 100;
                                return `
                                    <div class="compare-stat">
                                        <div class="compare-stat-label">${s.label}</div>
                                        <div class="compare-stat-value" style="color: ${s.color};">${formatNumber(v1)}</div>
                                        <div class="compare-stat-bar">
                                            <div class="compare-stat-fill" style="width: ${pct}%; background: ${s.color};"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    
                    <div class="compare-center">
                        ${stats.map(s => {
                            const v1 = s.getter ? s.getter(c1) : c1[s.key] || 0;
                            const v2 = s.getter ? s.getter(c2) : c2[s.key] || 0;
                            const diff = v1 - v2;
                            const diffPct = v2 > 0 ? (diff / v2 * 100) : 0;
                            return `
                                <div class="compare-metric">
                                    <div class="compare-metric-label">${s.label}</div>
                                    <div class="compare-metric-diff ${diff >= 0 ? 'positive' : 'negative'}">
                                        ${diff >= 0 ? '+' : ''}${formatNumber(diff)}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    
                    <div class="compare-column ${!c1Wins ? 'winner' : 'loser'}">
                        <div class="compare-profile">
                            <div class="compare-avatar">
                                ${c2.username.charAt(0)}
                                ${!c1Wins ? '<span class="winner-crown">👑</span>' : ''}
                            </div>
                            <div class="compare-name">${c2.username}</div>
                            <div class="compare-manager">${c2.manager || 'Unassigned'}</div>
                        </div>
                        <div class="compare-stats">
                            ${stats.map(s => {
                                const v1 = s.getter ? s.getter(c1) : c1[s.key] || 0;
                                const v2 = s.getter ? s.getter(c2) : c2[s.key] || 0;
                                const max = Math.max(v1, v2) || 1;
                                const pct = (v2 / max) * 100;
                                return `
                                    <div class="compare-stat">
                                        <div class="compare-stat-label">${s.label}</div>
                                        <div class="compare-stat-value" style="color: ${s.color};">${formatNumber(v2)}</div>
                                        <div class="compare-stat-bar">
                                            <div class="compare-stat-fill" style="width: ${pct}%; background: ${s.color};"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    
                    <div class="compare-chart-container">
                        <canvas id="comparisonChart" class="compare-chart"></canvas>
                    </div>
                </div>
            `;
            
            // Create radar chart
            setTimeout(() => createComparisonChart(c1, c2), 100);
        }
        
        function createComparisonChart(c1, c2) {
            const ctx = document.getElementById('comparisonChart');
            if (!ctx) return;
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Diamonds', 'Hours', 'Rewards', 'Score', 'Streams'],
                    datasets: [{
                        label: c1.username,
                        data: [
                            normalize(c1.diamonds, 5000000),
                            normalize(c1.hours, 200),
                            normalize(c1.rewards?.earned, 5000000),
                            normalize(c1.score, 100),
                            normalize(c1.liveStreams, 100)
                        ],
                        backgroundColor: 'rgba(255, 0, 68, 0.2)',
                        borderColor: '#ff0044',
                        borderWidth: 2
                    }, {
                        label: c2.username,
                        data: [
                            normalize(c2.diamonds, 5000000),
                            normalize(c2.hours, 200),
                            normalize(c2.rewards?.earned, 5000000),
                            normalize(c2.score, 100),
                            normalize(c2.liveStreams, 100)
                        ],
                        backgroundColor: 'rgba(0, 212, 255, 0.2)',
                        borderColor: '#00d4ff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#888' },
                            ticks: { display: false }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#888' }
                        }
                    }
                }
            });
        }
        
        function normalize(value, max) {
            return Math.min(100, ((value || 0) / max) * 100);
        }
        
        function clearComparison() {
            document.getElementById('creator1Select').value = '';
            document.getElementById('creator2Select').value = '';
            document.getElementById('comparisonContainer').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-users" style="font-size: 60px; color: #333; margin-bottom: 20px;"></i>
                    <h3>Select two creators to compare</h3>
                    <p>Use the dropdowns above or search to find creators</p>
                </div>
            `;
        }
        
        function shareComparison() {
            const c1 = document.getElementById('creator1Select').value;
            const c2 = document.getElementById('creator2Select').value;
            if (c1 && c2) {
                const url = `${window.location.origin}${window.location.pathname}?c1=${c1}&c2=${c2}`;
                navigator.clipboard.writeText(url);
                alert('Comparison link copied to clipboard!');
            }
        }
        
        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.quick-compare-item');
            items.forEach(item => {
                const name = item.querySelector('.quick-compare-name').textContent.toLowerCase();
                item.style.display = name.includes(query) ? 'block' : 'none';
            });
        });
        
        init();
    </script>
</body>
</html>

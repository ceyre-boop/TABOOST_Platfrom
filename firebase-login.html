<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABOOST - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0044, #cc0033);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #ff0044;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff0044, #cc0033);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        .toggle a {
            color: #ff0044;
            text-decoration: none;
        }
        .signup-hint {
            background: rgba(255,0,68,0.05);
            border: 1px dashed rgba(255,0,68,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .signup-hint.visible {
            display: block;
        }
        .signup-hint p {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .signup-hint a {
            color: #ff0044;
            text-decoration: none;
            font-weight: 600;
        }
        .error {
            background: rgba(255,0,68,0.1);
            border: 1px solid #ff0044;
            color: #ff0044;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            color: #888;
            margin-top: 10px;
        }
        .helper-text {
            color: #666;
            font-size: 0.75rem;
            margin-top: 5px;
        }
        .forgot-password {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        .forgot-password a {
            color: #888;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .forgot-password a:hover {
            color: #ff0044;
        }
        .email-field {
            display: none;
        }
        .email-field.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TABOOST</div>
        <p class="subtitle">Sign in to your account</p>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <form id="loginForm">
            <!-- CREATOR USERNAME (Primary) -->
            <div class="form-group">
                <label>TikTok Username *</label>
                <input type="text" id="username" placeholder="@yourusername or yourusername" required>
                <p class="helper-text">Enter your TikTok username (with or without @)</p>
            </div>
            
            <!-- EMAIL (Optional - shown if username not found or for new accounts) -->
            <div class="form-group email-field" id="emailField">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
                <p class="helper-text">Your account email (we'll look this up if needed)</p>
            </div>
            
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword(); return false;">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
            <div class="loading" id="loginLoading">Signing in...</div>
        </form>
        
        <div class="toggle">
            <span>First time here?</span>
            <a href="signup.html">Create account</a>
        </div>
        
        <div class="signup-hint" id="signupHint">
            <p>Don't have an account yet?</p>
            <a href="signup.html">Sign up here first →</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
            document.getElementById('signupHint').classList.remove('visible');
        }

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Already logged in, redirect
                redirectToDashboard();
            }
        });

        async function redirectToDashboard() {
            try {
                const user = auth.currentUser;
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data() || {};
                
                let role = userData.role || 'creator';
                if (user.email?.toLowerCase() === 'marco@taboost.me') {
                    role = 'admin';
                }
                
                if (role === 'admin') {
                    window.location.href = 'dashboard.html';
                } else if (role === 'manager') {
                    window.location.href = 'manager-dashboard.html';
                } else {
                    window.location.href = 'creator-dashboard.html';
                }
            } catch (error) {
                // Default to creator dashboard
                window.location.href = 'creator-dashboard.html';
            }
        }

        // LOGIN HANDLER
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let username = document.getElementById('username').value.trim().toLowerCase();
            let email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const loading = document.getElementById('loginLoading');
            
            // Remove @ if present
            username = username.replace(/^@/, '');
            
            btn.disabled = true;
            loading.style.display = 'block';
            hideMessages();
            
            try {
                // If user entered an email (contains @), use it directly
                if (username.includes('@')) {
                    email = username;
                }
                
                // If no email provided, look it up by username
                if (!email) {
                    showSuccess('Looking up your account...');
                    
                    // Try to find email by username in creatorRoster
                    const rosterDoc = await db.collection('creatorRoster').doc(username).get();
                    
                    if (rosterDoc.exists) {
                        const rosterData = rosterDoc.data();
                        // Check if there's a linked email in the roster
                        if (rosterData.email) {
                            email = rosterData.email;
                        } else {
                            // Need to check users collection
                            const usersSnapshot = await db.collection('users')
                                .where('tiktokUsername', '==', username)
                                .limit(1)
                                .get();
                            
                            if (!usersSnapshot.empty) {
                                const userData = usersSnapshot.docs[0].data();
                                email = userData.email;
                            }
                        }
                    }
                    
                    // If still no email found, show email field and ask user
                    if (!email) {
                        document.getElementById('emailField').classList.add('visible');
                        showError('Please enter your email address to sign in');
                        btn.disabled = false;
                        loading.style.display = 'none';
                        return;
                    }
                }
                
                // Now sign in with email + password
                showSuccess('Signing in...');
                await auth.signInWithEmailAndPassword(email, password);
                
                // Success! Redirect
                redirectToDashboard();
                
            } catch (error) {
                console.error('Login error:', error);
                
                // Show email field if we were trying to look up
                if (!document.getElementById('email').value) {
                    document.getElementById('emailField').classList.add('visible');
                }
                
                // User-friendly error messages
                let message = 'Unable to sign in. Please try again.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/invalid-credential':
                        message = 'Username or password is incorrect. Please try again, or create an account if you haven\'t signed up yet.';
                        break;
                    case 'auth/wrong-password':
                        message = 'Password is incorrect. Please try again or click "Forgot password?" to reset it.';
                        break;
                    case 'auth/invalid-email':
                        message = 'Please enter a valid email address or TikTok username.';
                        break;
                    case 'auth/user-disabled':
                        message = 'This account has been disabled. Please contact your manager.';
                        break;
                    case 'auth/too-many-requests':
                        message = 'Too many failed login attempts. Please wait a few minutes and try again.';
                        break;
                    case 'auth/network-request-failed':
                        message = 'Network connection issue. Please check your internet and try again.';
                        break;
                    case 'auth/internal-error':
                        message = 'Something went wrong on our end. Please try again in a moment.';
                        break;
                    default:
                        // Don't show technical error codes to users
                        if (error.message && error.message.includes('credential')) {
                            message = 'Login information is incorrect. Please check your username and password.';
                        }
                }
                
                showError(message);
                
                // Show signup hint for new users
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    document.getElementById('signupHint').classList.add('visible');
                }
                
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showForgotPassword() {
            const username = document.getElementById('username').value;
            if (username && !username.includes('@')) {
                showError('Please enter your email address to reset password');
                document.getElementById('emailField').classList.add('visible');
            } else if (username) {
                // Send reset email
                auth.sendPasswordResetEmail(username)
                    .then(() => showSuccess('Password reset email sent!'))
                    .catch(err => showError('Could not send reset email: ' + err.message));
            } else {
                showError('Please enter your email address first');
                document.getElementById('emailField').classList.add('visible');
            }
        }
    </script>
</body>
</html>

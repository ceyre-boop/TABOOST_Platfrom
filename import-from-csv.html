        let creatorsToImport = [];

        let importedCount = 0;
        let errorCount = 0;

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function parseCSV() {
            const csvText = document.getElementById('csvInput').value;
            if (!csvText.trim()) {
                log('❌ Please paste CSV data first!', 'error');
                return;
            }

            log('📊 Parsing CSV...', 'info');
            
            const lines = csvText.split('\n');
            const headers = lines[0].split(',');
            creatorsToImport = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(',');
                if (cols.length < 3) continue;
                
                const cid = cols[1]?.trim();
                const username = cols[2]?.trim();
                let manager = cols[7]?.trim() || 'carrington';
                
                // Clean up manager name
                if (manager.includes('+')) {
                    manager = manager.split('+')[0].trim();
                }
                if (manager.toLowerCase() === 'n/a' || !manager) {
                    manager = 'carrington';
                }
                
                if (cid && username && !ALREADY_IMPORTED.has(username.toLowerCase())) {
                    creatorsToImport.push({
                        cid: cid,
                        username: username.toLowerCase(),
                        manager: manager.toLowerCase(),
                        claimed: username.toLowerCase() === 'skylerclarkk'
                    });
                }
            }
            
            document.getElementById('csvTotal').textContent = lines.length - 1;
            document.getElementById('newCreators').textContent = creatorsToImport.length;
            document.getElementById('importSection').classList.remove('hidden');
            
            log(`✅ Found ${creatorsToImport.length} new creators to import`, 'success');
            log(`⏭️ Skipped ${ALREADY_IMPORTED.size} already imported`, 'info');
        }

        async function importBatch(startIndex, batchSize) {
            const batch = db.batch();
            const endIndex = Math.min(startIndex + batchSize, creatorsToImport.length);
            
            for (let i = startIndex; i < endIndex; i++) {
                const creator = creatorsToImport[i];
                const docRef = db.collection('creatorRoster').doc(creator.username);
                
                batch.set(docRef, {
                    cid: creator.cid,
                    tiktokUsername: creator.username,
                    claimed: creator.claimed || false,
                    manager: creator.manager.toUpperCase(),
                    importedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            await batch.commit();
            return endIndex - startIndex;
        }

        async function startImport() {
            if (creatorsToImport.length === 0) {
                log('❌ No creators to import!', 'error');
                return;
            }

            document.getElementById('importBtn').disabled = true;
            log(`🚀 Starting import of ${creatorsToImport.length} creators...`, 'info');

            const BATCH_SIZE = 400;

            while (currentIndex < creatorsToImport.length) {
                try {
                    const imported = await importBatch(currentIndex, BATCH_SIZE);
                    importedCount += imported;
                    currentIndex += BATCH_SIZE;
                    
                    const percent = Math.round((currentIndex / creatorsToImport.length) * 100);
                    document.getElementById('progressBar').style.width = `${percent}%`;
                    document.getElementById('progressBar').textContent = `${percent}%`;
                    document.getElementById('importedCount').textContent = importedCount;
                    
                    log(`✅ Imported ${imported} (${currentIndex}/${creatorsToImport.length})`, 'success');
                    
                    await new Promise(r => setTimeout(r, 500));
                    
                } catch (error) {
                    errorCount++;
                    document.getElementById('errorCount').textContent = errorCount;
                    log(`❌ Error: ${error.message}`, 'error');
                    currentIndex += BATCH_SIZE;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            log(`🎉 COMPLETE! Imported: ${importedCount}, Errors: ${errorCount}`, 'success');
            document.getElementById('importBtn').disabled = false;
            document.getElementById('importBtn').textContent = '🔄 IMPORT COMPLETE';
        }

        // Initialize
        log('📋 Ready. Paste CSV data and click PARSE CSV', 'info');
    </script>
</body>
</html>

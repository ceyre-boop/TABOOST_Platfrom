<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=dashboard-new/">
    <title>Marco Command Center - Redirecting</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #FF0055;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Loading Marco Command Center...</p>
        <p style="font-size: 12px; color: #666;">If not redirected, <a href="dashboard-new/" style="color: #FF0055;">click here</a></p>
    </div>
</body>
</html>

    app/components/layout/topbar.tsx: |
      import { useEffect, useState } from 'react';
      import type { PageId } from '../../app';

      interface Props {
        pageTitle: string;
        onNavigate: (p: PageId) => void;
      }

      export function Topbar({ pageTitle, onNavigate }: Props) {
        const [time, setTime] = useState('');

        useEffect(() => {
          function tick() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            setTime(`${h}:${m}:${s}`);
          }
          tick();
          const id = setInterval(tick, 1000);
          return () => clearInterval(id);
        }, []);

        return (
          <header className="h-[54px] bg-black/80 backdrop-blur border-b border-[#1a1a1a] flex items-center px-6 gap-4 shrink-0 z-10">
            <h1 className="font-bebas text-2xl text-white tracking-widest flex-1">{pageTitle}</h1>

            <div className="flex items-center gap-1.5">
              <span className="live-dot inline-block w-2 h-2 rounded-full bg-green-400 shrink-0" />
              <span className="text-green-400 font-mono text-xs tracking-widest">LIVE</span>
            </div>

            <span className="font-mono text-sm text-gray-300 tabular-nums">{time}</span>

            <button className="border border-[#333] text-gray-400 hover:text-white hover:border-[#ff0044] text-xs font-mono px-3 py-1 rounded transition-colors">
              EXPORT
            </button>

            <button
              onClick={() => onNavigate('alerts')}
              className="bg-[#ff0044] text-white text-xs font-mono px-3 py-1 rounded flex items-center gap-1.5 hover:bg-[#cc0033] transition-colors"
            >
              <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse" />
              ALERTS 3
            </button>
          </header>
        );
      }
    app/components/layout/ticker-tape.tsx: |
      import { CREATORS } from '../../data/creators';

      const TICKER_CREATORS = CREATORS
        .filter(c => c.diamonds > 0)
        .sort((a, b) => b.diamonds - a.diamonds)
        .slice(0, 15);

      function fmt(n: number): string {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }

      export function TickerTape() {
        const items = [...TICKER_CREATORS, ...TICKER_CREATORS];

        return (
          <div className="h-8 bg-[#0a0a0a] border-b border-[#1a1a1a] overflow-hidden flex items-center shrink-0">
            <div className="ticker-scroll flex items-center whitespace-nowrap gap-0" style={{ width: 'max-content' }}>
              {items.map((c, i) => {
                const up = c.last30Days >= c.prevMonth;
                return (
                  <span key={i} className="flex items-center gap-1 px-3">
                    <span className="text-gray-500 font-mono text-[10px]">◆</span>
                    <span className="text-[#ff0044] font-mono text-[11px]">|</span>
                    <span className="text-gray-300 font-mono text-[11px] uppercase">{c.name}</span>
                    <span className="text-white font-mono text-[11px] font-bold">{fmt(c.diamonds)}</span>
                    <span className={`font-mono text-[11px] ${up ? 'text-green-400' : 'text-red-400'}`}>
                      {up ? '▲' : '▼'}
                    </span>
                  </span>
                );
              })}
            </div>
          </div>
        );
      }

                      <th className="py-2 px-3 text-center w-8">RANK</th>
                      <th className="py-2 px-3 text-left">CREATOR</th>
                      <th className="py-2 px-3 text-left">MANAGER</th>
                      <th className="py-2 px-3 text-left">TIER</th>
                      <th className="py-2 px-3 text-left">DIAMONDS</th>
                      <th className="py-2 px-3 text-left">REWARDS</th>
                      <th className="py-2 px-3 text-left">HRS</th>
                      <th className="py-2 px-3 text-left">SCORE</th>
                      {mode === 'momentum' && <th className="py-2 px-3 text-left">MOMENTUM ↑</th>}
                    </tr>
                  </thead>
                  <tbody>
                    {paged.map((c, i) => {
                      const rank = (page - 1) * PAGE_SIZE + i + 1;
                      const medals = ['🥇', '🥈', '🥉'];
                      const dphVal = c.hours > 0 ? Math.round(c.diamonds / c.hours) : 0;
                      const diamondRank = diamondRanks.get(c.id) ?? 999;
                      const momRank = rank;
                      const rankDiff = mode === 'momentum' ? diamondRank - momRank : null;

                      return (
                        <tr key={c.id}
                          className="border-b border-[#111] hover:bg-[#ff0044]/5 cursor-pointer transition-colors"
                          onClick={() => onCreatorClick(c)}
                        >
                          <td className="py-2 px-3 text-xs font-mono text-gray-500 text-center">
                            {rank <= 3 ? medals[rank - 1] : rank}
                          </td>
                          <td className="py-2 px-3">
                            <div className="flex items-center gap-2">
                              <div className="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bebas text-white shrink-0"
                                style={{ background: `${MANAGER_COLORS[c.manager] ?? '#888'}33` }}>
                                {c.name[0]?.toUpperCase()}
                              </div>
                              <div>
                                <div className="text-xs text-white font-dm-sans">{c.name}</div>
                                <div className="text-[9px] text-gray-600 font-mono">{c.badge}</div>
                              </div>
                            </div>
                          </td>
                          <td className="py-2 px-3">
                            <span className="text-xs font-mono font-bold" style={{ color: MANAGER_COLORS[c.manager] ?? '#888' }}>{c.manager}</span>
                          </td>
                          <td className="py-2 px-3"><TierChip tier={c.tier} /></td>
                          <td className="py-2 px-3">
                            <div>
                              <span className="text-xs font-mono text-white font-bold">{fmt(c.diamonds)}</span>
                              {dphVal > 0 && <div className="text-[9px] font-mono text-gray-600">{fmt(dphVal)}/hr</div>}
                            </div>
                          </td>
                          <td className="py-2 px-3 text-xs font-mono text-green-400">${fmt(c.rewards)}</td>
                          <td className="py-2 px-3 text-xs font-mono text-gray-400">{c.hours}h</td>
                          <td className="py-2 px-3 w-24"><ScoreBar score={c.score} /></td>
                          {mode === 'momentum' && (
                            <td className="py-2 px-3">
                              <div>
                                <span className="text-xs font-mono text-amber-400 font-bold">{fmt(Math.round(momentum(c)))}</span>
                                {rankDiff !== null && (
                                  <div className={`text-[9px] font-mono ${rankDiff > 0 ? 'text-green-400' : rankDiff < 0 ? 'text-red-400' : 'text-gray-600'}`}>
                                    {rankDiff > 0 ? `↑${rankDiff}` : rankDiff < 0 ? `↓${Math.abs(rankDiff)}` : '—'} positions
                                  </div>
                                )}
                              </div>
                            </td>
                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="px-4 py-3 border-t border-[#111] flex items-center justify-between bg-[#0a0a0a]">
                <span className="text-[10px] font-mono text-gray-600">
                  {(page - 1) * PAGE_SIZE + 1}–{Math.min(page * PAGE_SIZE, sorted.length)} of {sorted.length}
                </span>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-mono text-gray-600">Page {page} of {totalPages}</span>
                  <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}
                    className="text-xs font-mono px-3 py-1 bg-[#111] border border-[#222] text-gray-400 rounded hover:border-[#ff0044] disabled:opacity-30 transition-colors">PREV</button>
                  <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}
                    className="text-xs font-mono px-3 py-1 bg-[#111] border border-[#222] text-gray-400 rounded hover:border-[#ff0044] disabled:opacity-30 transition-colors">NEXT</button>
                </div>
              </div>
            </div>
          </div>
        );
      }
    app/components/pages/creator-health-page.tsx: >
      import { CREATORS, MANAGER_COLORS } from '../../data/creators';

      import { KpiTile } from '../shared/kpi-tile';

      import { TierChip } from '../shared/tier-chip';

      import type { Creator } from '../../types';


      interface Props { onCreatorClick: (c: Creator) => void; }


      function fmt(n: number): string {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }


      const ACTIVE = CREATORS.filter(c => c.diamonds > 0);

      const HEALTHY = ACTIVE.filter(c => c.score >= 70);

      const WATCHLIST = ACTIVE.filter(c => c.score >= 40 && c.score < 70);

      const AT_RISK = ACTIVE.filter(c => c.score < 40);

      const AVG_SCORE = Math.round(ACTIVE.reduce((s, c) => s + c.score, 0) /
      ACTIVE.length);


      const TOP_HEALTH = [...HEALTHY].sort((a, b) => b.score - a.score).slice(0,
      6);

      const AT_RISK_TOP = [...AT_RISK].sort((a, b) => a.score -
      b.score).slice(0, 6);


      const TOTAL_RISK_REVENUE = AT_RISK.reduce((s, c) => s + c.rewards, 0);


      export function CreatorHealthPage({ onCreatorClick }: Props) {
        return (
          <div className="space-y-5">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <KpiTile label="Healthy (70+)" value={String(HEALTHY.length)} sub="Strong performers" trend="up" color="#22c55e" />
              <KpiTile label="Watch List (40-69)" value={String(WATCHLIST.length)} sub="Needs attention" color="#f59e0b" />
              <KpiTile label="At Risk (<40)" value={String(AT_RISK.length)} sub="Intervention needed" trend="down" color="#ef4444" />
              <KpiTile label="Avg Score" value={`${AVG_SCORE}/100`} sub="Agency average" />
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
              {/* Healthy */}
              <div>
                <div className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3">TOP PERFORMERS — ACCOUNT HEALTH</div>
                <div className="space-y-3">
                  {TOP_HEALTH.map(c => {
                    const pctToGoal = Math.min(100, Math.round((c.diamonds / c.tierGoal) * 100));
                    const remaining = Math.max(0, c.tierGoal - c.diamonds);
                    return (
                      <div key={c.id}
                        className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4 card-hover cursor-pointer relative overflow-hidden"
                        onClick={() => onCreatorClick(c)}
                      >
                        <div className="absolute top-3 right-3">
                          <span className="live-dot inline-block w-2.5 h-2.5 rounded-full bg-green-400" />
                        </div>
                        <div className="flex items-start gap-3 mb-3">
                          <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-bebas text-sm shrink-0"
                            style={{ background: `${MANAGER_COLORS[c.manager] ?? '#888'}33`, border: `1px solid ${MANAGER_COLORS[c.manager] ?? '#888'}66` }}>
                            {c.name[0]?.toUpperCase()}
                          </div>
                          <div className="flex-1">
                            <div className="text-sm font-dm-sans text-white">{c.name}</div>
                            <div className="flex items-center gap-2 mt-0.5">
                              <span className="text-[10px] font-mono" style={{ color: MANAGER_COLORS[c.manager] ?? '#888' }}>{c.manager}</span>
                              <TierChip tier={c.tier} />
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-xl font-bebas text-white">{fmt(c.diamonds)}</div>
                            <div className="text-[9px] font-mono text-gray-600">DIAMONDS THIS MONTH</div>
                          </div>
                        </div>
                        <div className="mb-1 flex justify-between text-[10px] font-mono text-gray-500">
                          <span>{pctToGoal}% to T{c.tier - 1 > 0 ? c.tier - 1 : 1} goal</span>
                          <span className="text-green-400">{fmt(remaining)} remaining</span>
                        </div>
                        <div className="h-2 bg-[#1a1a1a] rounded-full overflow-hidden">
                          <div className="h-full bg-green-500 rounded-full" style={{ width: `${pctToGoal}%` }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* At Risk */}
              <div>
                <div className="text-[10px] font-mono text-red-500 uppercase tracking-widest mb-3">AT-RISK CREATORS</div>
                <div className="space-y-3">
                  {AT_RISK_TOP.map(c => {
                    const decline = c.prevMonth > 0 ? ((c.last30Days - c.prevMonth) / c.prevMonth * 100).toFixed(1) : '0';
                    return (
                      <div key={c.id}
                        className="bg-[#0d0d0d] border border-red-900/40 rounded p-4 cursor-pointer hover:border-red-500/40 transition-colors relative"
                        onClick={() => onCreatorClick(c)}
                      >
                        <div className="absolute top-3 right-3">
                          <span className="risk-dot inline-block w-2.5 h-2.5 rounded-full bg-red-500" />
                        </div>
                        <div className="flex items-center gap-3">
                          <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-bebas text-sm shrink-0 bg-red-900/40">
                            {c.name[0]?.toUpperCase()}
                          </div>
                          <div className="flex-1">
                            <div className="text-sm font-dm-sans text-white">{c.name}</div>
                            <div className="flex items-center gap-2 mt-0.5">
                              <span className="text-[10px] font-mono text-gray-500">{c.manager}</span>
                              <TierChip tier={c.tier} />
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-xl font-bebas text-red-400">{fmt(c.diamonds)}</div>
                            <div className="text-[9px] font-mono text-gray-600">Score: {c.score}/100</div>
                            <div className="text-[10px] font-mono text-red-400">{parseFloat(decline) < 0 ? '▼' : '▲'}{Math.abs(parseFloat(decline))}% MoM</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Insight box */}
                <div className="mt-4 bg-[#0d0d0d] border border-[#ff0044]/30 rounded p-4">
                  <div className="text-[10px] font-mono text-[#ff0044] uppercase tracking-widest mb-2">AI RISK SUMMARY</div>
                  <p className="text-xs font-dm-sans text-gray-400 leading-relaxed">
                    <span className="text-[#ff0044] font-bold">{AT_RISK.length} creators flagged</span> with risk score below 40.
                    Estimated monthly revenue at risk: <span className="text-amber-400 font-bold">${fmt(TOTAL_RISK_REVENUE)}</span>.
                    Primary risk factors: declining stream hours, stagnant diamond growth, and peer comparison gap.
                    Recommend immediate manager outreach for bottom 5 by score.
                  </p>
                </div>
              </div>
            </div>
          </div>
        );
      }
    app/components/pages/milestones-page.tsx: >
      import { CREATORS, MANAGER_COLORS } from '../../data/creators';

      import { KpiTile } from '../shared/kpi-tile';

      import { TierChip } from '../shared/tier-chip';

      import type { Creator, Tier } from '../../types';


      interface Props { onCreatorClick: (c: Creator) => void; }


      function fmt(n: number): string {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }


      const ACTIVE = CREATORS.filter(c => c.diamonds > 0 && c.tier > 1);

      const NEAR = ACTIVE.filter(c => {
        const pct = c.diamonds / c.tierGoal;
        return pct >= 0.7 && pct < 1.0;
      }).sort((a, b) => (b.diamonds / b.tierGoal) - (a.diamonds / a.tierGoal));


      const AVG_COMPLETION = Math.round(
        ACTIVE.reduce((s, c) => s + Math.min(100, (c.diamonds / c.tierGoal) * 100), 0) / ACTIVE.length
      );


      const FASTEST = [...ACTIVE].sort((a, b) => (b.diamonds - b.prevMonth) -
      (a.diamonds - a.prevMonth))[0];


      export function MilestonesPage({ onCreatorClick }: Props) {
        return (
          <div className="space-y-5">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <KpiTile label="Near Promotion" value={String(NEAR.length)} sub="70%+ to next tier" trend="up" color="#22c55e" />
              <KpiTile label="Avg Completion" value={`${AVG_COMPLETION}%`} sub="To next tier" />
              <KpiTile label="Fastest Riser" value={FASTEST?.name?.slice(0, 10) ?? ''} sub={`${fmt(FASTEST?.diamonds ?? 0)} this month`} trend="up" />
              <KpiTile label="Tier Promotions" value="+23" sub="This month" trend="up" color="#22c55e" />
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
              {/* Near tier-up cards */}
              <div>
                <div className="text-[10px] font-mono text-green-500 uppercase tracking-widest mb-3">
                  CLOSE TO TIER UP — PUSH THEM OVER
                </div>
                <div className="space-y-3">
                  {NEAR.slice(0, 8).map(c => {
                    const pct = Math.min(100, Math.round((c.diamonds / c.tierGoal) * 100));
                    const remaining = Math.max(0, c.tierGoal - c.diamonds);
                    const dpr = c.daysStreamed > 0 ? c.diamonds / c.daysStreamed : 0;
                    const hrsNeeded = dpr > 0 ? Math.round(remaining / (dpr / (c.hours / c.daysStreamed || 1))) : 0;
                    const isPush = pct >= 95;

                    return (
                      <div key={c.id}
                        className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4 card-hover cursor-pointer"
                        onClick={() => onCreatorClick(c)}
                      >
                        <div className="flex items-center justify-between mb-3">
                          <div>
                            <div className="text-sm font-dm-sans text-white">{c.name}</div>
                            <div className="flex items-center gap-2 mt-0.5">
                              <span className="text-[10px] font-mono" style={{ color: MANAGER_COLORS[c.manager] ?? '#888' }}>{c.manager}</span>
                              <TierChip tier={c.tier} />
                              <span className="text-[10px] font-mono text-gray-500">→</span>
                              <TierChip tier={Math.max(1, c.tier - 1) as Tier} />
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-3xl font-bebas text-white">{pct}%</div>
                            {isPush && <div className="text-[10px] font-mono text-[#ff0044]">🔥 PUSH THEM OVER!</div>}
                          </div>
                        </div>
                        <div className="flex justify-between text-[10px] font-mono text-gray-500 mb-1">
                          <span>{fmt(c.diamonds)} / {fmt(c.tierGoal)}</span>
                          <span className="text-amber-400">~{hrsNeeded}h to goal</span>
                        </div>
                        <div className="h-2.5 bg-[#1a1a1a] rounded-full overflow-hidden">
                          <div className="h-full shimmer-bar rounded-full" style={{ width: `${pct}%` }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Full table */}
              <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
                <div className="px-4 py-3 border-b border-[#1a1a1a]">
                  <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">ALL ACTIVE — TIER PROGRESS</span>
                </div>
                <div className="overflow-y-auto" style={{ maxHeight: 600 }}>
                  <table className="w-full">
                    <thead className="sticky top-0 bg-[#0a0a0a]">
                      <tr className="text-[10px] font-mono text-gray-600 border-b border-[#111]">
                        <th className="py-2 px-3 text-left">CREATOR</th>
                        <th className="py-2 px-3 text-left">TIER</th>
                        <th className="py-2 px-3 text-left">GOAL</th>
                        <th className="py-2 px-3 text-left">PROGRESS</th>
                      </tr>
                    </thead>
                    <tbody>
                      {ACTIVE.sort((a, b) => (b.diamonds / b.tierGoal) - (a.diamonds / a.tierGoal)).map(c => {
                        const pct = Math.min(100, Math.round((c.diamonds / c.tierGoal) * 100));
                        const rem = Math.max(0, c.tierGoal - c.diamonds);
                        return (
                          <tr key={c.id}
                            className="border-b border-[#0f0f0f] hover:bg-[#ff0044]/5 cursor-pointer transition-colors"
                            onClick={() => onCreatorClick(c)}
                          >
                            <td className="py-1.5 px-3 text-xs text-white font-dm-sans">{c.name.slice(0, 14)}</td>
                            <td className="py-1.5 px-3"><TierChip tier={c.tier} /></td>
                            <td className="py-1.5 px-3 text-[10px] font-mono text-gray-500">{fmt(c.tierGoal)}</td>
                            <td className="py-1.5 px-3">
                              <div className="flex items-center gap-2">
                                <div className="w-20 h-1.5 bg-[#1a1a1a] rounded-full overflow-hidden">
                                  <div className="h-full rounded-full" style={{
                                    width: `${pct}%`,
                                    background: pct >= 70 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444',
                                  }} />
                                </div>
                                <span className="text-[10px] font-mono text-gray-500">{pct}%</span>
                                <span className="text-[10px] font-mono text-gray-600">{fmt(rem)} left</span>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        );
      }

                    <Scatter data={withQ} onClick={d => onCreatorClick(d.creator)}>
                      {withQ.map((p, i) => <Cell key={i} fill={Q_LABELS[p.q].color} fillOpacity={0.7} />)}
                    </Scatter>
                  </ScatterChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
        );
      }
    app/components/pages/concentration-page.tsx: |
      import { useMemo } from 'react';
      import { CREATORS, MANAGER_COLORS } from '../../data/creators';

      function fmt(n: number) {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }

      interface MgrStats { name: string; diamonds: number; share: number; }

      export function ConcentrationPage() {
        const mgrStats = useMemo<MgrStats[]>(() => {
          const map = new Map<string, number>();
          CREATORS.forEach(c => map.set(c.manager, (map.get(c.manager) ?? 0) + c.diamonds));
          const total = CREATORS.reduce((s, c) => s + c.diamonds, 0);
          return Array.from(map.entries())
            .map(([name, diamonds]) => ({ name, diamonds, share: diamonds / total }))
            .sort((a, b) => b.diamonds - a.diamonds);
        }, []);

        const hhi = useMemo(() => Math.round(mgrStats.reduce((s, m) => s + (m.share * 100) ** 2, 0)), [mgrStats]);

        const carrington = mgrStats.find(m => m.name === 'CARRINGTON');
        const hhiWithout = useMemo(() => {
          if (!carrington) return hhi;
          const remaining = mgrStats.filter(m => m.name !== 'CARRINGTON');
          const remTotal = remaining.reduce((s, m) => s + m.diamonds, 0);
          return Math.round(remaining.reduce((s, m) => s + ((m.diamonds / remTotal) * 100) ** 2, 0));
        }, [mgrStats, carrington, hhi]);

        const hhiStatus = hhi < 1500 ? { label: 'HEALTHY', color: '#22c55e' } : hhi < 2500 ? { label: 'MODERATE', color: '#f59e0b' } : { label: 'CONCENTRATED', color: '#ef4444' };

        const totalDiamonds = CREATORS.reduce((s, c) => s + c.diamonds, 0);

        return (
          <div className="space-y-5">
            {/* HHI score */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
              <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-6 card-hover flex flex-col items-center justify-center">
                <div className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2">HHI CONCENTRATION INDEX</div>
                <div className="text-6xl font-bebas" style={{ color: hhiStatus.color }}>{hhi.toLocaleString()}</div>
                <div className="text-xs font-mono mt-1" style={{ color: hhiStatus.color }}>{hhiStatus.label}</div>
                <div className="text-[10px] font-mono text-gray-600 mt-2 text-center">
                  {'{>'} 2500 = dangerous concentration
                </div>
              </div>

              <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-6 card-hover">
                <div className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3">WHAT IF CARRINGTON LEAVES?</div>
                <div className="flex items-end gap-4">
                  <div>
                    <div className="text-[9px] font-mono text-gray-600">CURRENT HHI</div>
                    <div className="text-3xl font-bebas" style={{ color: hhiStatus.color }}>{hhi.toLocaleString()}</div>
                  </div>
                  <div className="text-gray-600 font-mono pb-1">→</div>
                  <div>
                    <div className="text-[9px] font-mono text-gray-600">WITHOUT CARRINGTON</div>
                    <div className="text-3xl font-bebas text-green-400">{hhiWithout.toLocaleString()}</div>
                  </div>
                </div>
                <div className="mt-3 text-[10px] font-dm-sans text-gray-400">
                  Revenue lost: <span className="text-red-400 font-bold">${fmt(carrington?.diamonds ? carrington.diamonds * 5 : 0)}</span> estimated
                </div>
              </div>

              <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-5 card-hover">
                <div className="text-[10px] font-mono text-[#ff0044] uppercase tracking-widest mb-2">RISK CALLOUT</div>
                <p className="text-xs font-dm-sans text-gray-400 leading-relaxed">
                  An HHI above 2500 indicates dangerous monopoly concentration. Redistribute top creators across managers, 
                  and recruit to diversify revenue streams. CARRINGTON departure would significantly reduce concentration.
                </p>
              </div>
            </div>

            {/* Proportional area (treemap-style) */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">DIAMOND SHARE BY MANAGER</span>
              </div>
              <div className="p-4 flex flex-wrap gap-1" style={{ minHeight: 200 }}>
                {mgrStats.map(m => {
                  const pct = m.share * 100;
                  const color = MANAGER_COLORS[m.name] ?? '#888';
                  const w = Math.max(40, Math.round(pct * 8));
                  const h = Math.max(40, Math.round(pct * 4));
                  return (
                    <div key={m.name}
                      className="flex flex-col items-center justify-center rounded border text-center overflow-hidden shrink-0"
                      style={{ width: w, height: h, background: `${color}22`, borderColor: `${color}44` }}
                      title={`${m.name}: ${pct.toFixed(1)}%`}
                    >
                      {pct > 5 && <div className="text-[9px] font-bebas" style={{ color }}>{m.name}</div>}
                      {pct > 3 && <div className="text-[9px] font-mono text-gray-400">{pct.toFixed(1)}%</div>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Table */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">MANAGER CONCENTRATION TABLE</span>
              </div>
              <table className="w-full">
                <thead>
                  <tr className="text-[10px] font-mono text-gray-600 border-b border-[#111] bg-[#0a0a0a]">
                    <th className="py-2 px-4 text-left">#</th>
                    <th className="py-2 px-4 text-left">MANAGER</th>
                    <th className="py-2 px-4 text-left">DIAMONDS</th>
                    <th className="py-2 px-4 text-left">SHARE</th>
                    <th className="py-2 px-4 text-left">HHI CONTRIBUTION</th>
                  </tr>
                </thead>
                <tbody>
                  {mgrStats.map((m, i) => {
                    const color = MANAGER_COLORS[m.name] ?? '#888';
                    const hhiContrib = Math.round((m.share * 100) ** 2);
                    return (
                      <tr key={m.name} className="border-b border-[#111] hover:bg-[#ff0044]/5 transition-colors">
                        <td className="py-2 px-4 text-xs font-mono text-gray-600">{i + 1}</td>
                        <td className="py-2 px-4">
                          <span className="text-xs font-bebas" style={{ color }}>{m.name}</span>
                        </td>
                        <td className="py-2 px-4 text-xs font-mono text-white font-bold">{fmt(m.diamonds)}</td>
                        <td className="py-2 px-4">
                          <div className="flex items-center gap-2">
                            <div className="w-20 h-1.5 bg-[#1a1a1a] rounded-full overflow-hidden">
                              <div className="h-full rounded-full" style={{ width: `${m.share * 100}%`, background: color }} />
                            </div>
                            <span className="text-[10px] font-mono text-gray-400">{(m.share * 100).toFixed(1)}%</span>
                          </div>
                        </td>
                        <td className="py-2 px-4 text-xs font-mono text-amber-400">{hhiContrib}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      }
    app/components/pages/hours-trap-page.tsx: |
      import { useMemo } from 'react';
      import { CREATORS, MANAGER_COLORS } from '../../data/creators';
      import { TierChip } from '../shared/tier-chip';
      import type { Creator } from '../../types';

      interface Props { onCreatorClick: (c: Creator) => void; }

      function fmt(n: number) {
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }

      export function HoursTrapPage({ onCreatorClick }: Props) {
        const trapped = useMemo(() =>
          CREATORS.filter(c => c.hours >= 25 && c.score < 50 && c.diamonds > 0)
            .sort((a, b) => b.hours - a.hours),
          []);

        const tierAvgDph = useMemo(() => {
          const map = new Map<number, number[]>();
          CREATORS.filter(c => c.hours > 0 && c.diamonds > 0).forEach(c => {
            if (!map.has(c.tier)) map.set(c.tier, []);
            map.get(c.tier)!.push(c.diamonds / c.hours);
          });
          const result = new Map<number, number>();
          map.forEach((vals, tier) => result.set(tier, Math.round(vals.reduce((a, b) => a + b, 0) / vals.length)));
          return result;
        }, []);

        return (
          <div className="space-y-5">
            <div className="bg-[#0d0d0d] border border-[#ff0044]/30 rounded p-5 red-glow">
              <div className="text-xs font-mono text-[#ff0044] uppercase tracking-widest mb-2">⚠️ HOURS TRAP DETECTION</div>
              <p className="text-xs font-dm-sans text-gray-300 leading-relaxed mb-2">
                <span className="text-[#ff0044] font-bold">{trapped.length} creators</span> are streaming 25+ hours with score below 50.
                This is the Hours Trap: maximum effort, below-average results. It's both a retention risk and a welfare concern —
                burnout is the #1 reason high-effort, low-result creators quit suddenly.
              </p>
              <div className="grid grid-cols-3 gap-4 mt-3">
                {[
                  { label: 'TRAPPED CREATORS', value: String(trapped.length), color: '#ef4444' },
                  { label: 'AVG HOURS', value: trapped.length > 0 ? `${Math.round(trapped.reduce((s, c) => s + c.hours, 0) / trapped.length)}h` : '0h', color: '#f59e0b' },
                  { label: 'AVG SCORE', value: trapped.length > 0 ? String(Math.round(trapped.reduce((s, c) => s + c.score, 0) / trapped.length)) : '0', color: '#fff' },
                ].map(s => (
                  <div key={s.label} className="bg-[#0a0a0a] rounded p-3">
                    <div className="text-[9px] font-mono text-gray-600">{s.label}</div>
                    <div className="text-2xl font-bebas" style={{ color: s.color }}>{s.value}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="space-y-3">
              {trapped.map(c => {
                const dph = Math.round(c.diamonds / c.hours);
                const tierAvg = tierAvgDph.get(c.tier) ?? 1;
                const effPct = Math.round((dph / tierAvg) * 100);
                const intervention = c.hours > 35 ? 'REDUCE HOURS — Burnout risk critical. Schedule streaming break immediately.'
                  : effPct < 50 ? 'CHANGE CONTENT — ◆/hr severely below tier avg. Content approach needs full review.'
                  : 'OPTIMIZE SCHEDULE — Shift stream times to higher-traffic windows.';

                return (
                  <div key={c.id}
                    className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4 card-hover cursor-pointer"
                    onClick={() => onCreatorClick(c)}
                  >
                    <div className="flex items-start justify-between mb-3">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-red-900/40 flex items-center justify-center text-white font-bebas text-sm">
                          {c.name[0]?.toUpperCase()}
                        </div>
                        <div>
                          <div className="text-sm font-dm-sans text-white">{c.name}</div>
                          <div className="flex items-center gap-2 mt-0.5">
                            <span className="text-[10px] font-mono" style={{ color: MANAGER_COLORS[c.manager] ?? '#888' }}>{c.manager}</span>
                            <TierChip tier={c.tier} />
                          </div>
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-xs font-mono text-red-400 font-bold">{c.hours}h streamed</div>
                        <div className="text-xs font-mono text-gray-500">Score: {c.score}/100</div>
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-3 mb-3">
                      <div className="bg-[#0a0a0a] rounded p-2">
                        <div className="text-[9px] font-mono text-gray-600">◆/HR ACTUAL</div>
                        <div className="text-sm font-mono text-red-400 font-bold">{fmt(dph)}</div>
                      </div>
                      <div className="bg-[#0a0a0a] rounded p-2">
                        <div className="text-[9px] font-mono text-gray-600">TIER AVG ◆/HR</div>
                        <div className="text-sm font-mono text-gray-300">{fmt(tierAvg)}</div>
                      </div>
                      <div className="bg-[#0a0a0a] rounded p-2">
                        <div className="text-[9px] font-mono text-gray-600">EFFICIENCY</div>
                        <div className="text-sm font-mono" style={{ color: effPct < 70 ? '#ef4444' : '#f59e0b' }}>{effPct}%</div>
                      </div>
                    </div>
                    <div className="bg-[#ff0044]/10 border border-[#ff0044]/20 rounded px-3 py-2">
                      <span className="text-[10px] font-mono text-[#ff0044]">INTERVENTION: </span>
                      <span className="text-[10px] font-mono text-gray-300">{intervention}</span>
                    </div>
                  </div>
                );
              })}

              {trapped.length === 0 && (
                <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-8 text-center">
                  <div className="text-3xl mb-2">✅</div>
                  <div className="text-sm font-mono text-green-400">No hours-trapped creators detected</div>
                </div>
              )}
            </div>
          </div>
        );
      }
    app/components/pages/reward-ratio-page.tsx: |
      import { useMemo } from 'react';
      import { CREATORS, MANAGER_COLORS } from '../../data/creators';
      import { TierChip } from '../shared/tier-chip';
      import type { Creator } from '../../types';

      interface Props { onCreatorClick: (c: Creator) => void; }

      function fmt(n: number) {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }

      function ratioColor(ratio: number): { color: string; label: string } {
        if (ratio >= 3) return { color: '#fbbf24', label: 'GOLD' };
        if (ratio >= 1) return { color: '#d1d5db', label: 'SILVER' };
        return { color: '#555', label: 'FRAGILE' };
      }

      export function RewardRatioPage({ onCreatorClick }: Props) {
        const withRatio = useMemo(() =>
          CREATORS.filter(c => c.diamonds > 0)
            .map(c => ({ ...c, ratio: c.diamonds > 0 ? parseFloat((c.rewards / c.diamonds).toFixed(2)) : 0 }))
            .sort((a, b) => b.ratio - a.ratio),
          []);

        const gold = withRatio.filter(c => c.ratio >= 3);
        const silver = withRatio.filter(c => c.ratio >= 1 && c.ratio < 3);
        const fragile = withRatio.filter(c => c.ratio < 1);

        return (
          <div className="space-y-5">
            <div className="grid grid-cols-3 gap-4">
              {[
                { label: 'GOLD (≥3.0)', count: gold.length, color: '#fbbf24', desc: 'Deeply loyal audiences' },
                { label: 'SILVER (1.0-3.0)', count: silver.length, color: '#d1d5db', desc: 'Standard engagement' },
                { label: 'FRAGILE (<1.0)', count: fragile.length, color: '#555', desc: 'Reach without loyalty' },
              ].map(s => (
                <div key={s.label} className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4 card-hover">
                  <div className="text-[10px] font-mono text-gray-600 mb-1">{s.label}</div>
                  <div className="text-3xl font-bebas" style={{ color: s.color }}>{s.count}</div>
                  <div className="text-[10px] font-mono text-gray-500">{s.desc}</div>
                </div>
              ))}
            </div>

            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4">
              <div className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2">ABOUT THIS METRIC</div>
              <p className="text-xs font-dm-sans text-gray-400 leading-relaxed">
                Reward-to-Diamond ratio reveals audience loyalty and gifting intensity independent of raw performance.
                A ratio of 5.0 means the audience gifts 5× more per diamond than a creator with ratio 1.0.
                High ratio + low diamonds = <span className="text-amber-400">hidden gem</span> with loyal micro-audience.
                Low ratio + high diamonds = <span className="text-red-400">structurally fragile</span> — reach without loyalty.
              </p>
            </div>

            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">ALL CREATORS — REWARD/DIAMOND RATIO</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-[10px] font-mono text-gray-600 border-b border-[#111] bg-[#0a0a0a]">
                      <th className="py-2 px-3 text-center w-8">#</th>
                      <th className="py-2 px-3 text-left">CREATOR</th>
                      <th className="py-2 px-3 text-left">MANAGER</th>
                      <th className="py-2 px-3 text-left">TIER</th>
                      <th className="py-2 px-3 text-left">DIAMONDS</th>
                      <th className="py-2 px-3 text-left">REWARDS</th>
                      <th className="py-2 px-3 text-left">RATIO</th>
                      <th className="py-2 px-3 text-left">LOYALTY</th>
                    </tr>
                  </thead>
                  <tbody>
                    {withRatio.slice(0, 50).map((c, i) => {
                      const r = ratioColor(c.ratio);
                      return (
                        <tr key={c.id}
                          className="border-b border-[#111] hover:bg-[#ff0044]/5 cursor-pointer transition-colors"
                          onClick={() => onCreatorClick(c)}
                        >
                          <td className="py-2 px-3 text-xs font-mono text-gray-600 text-center">{i + 1}</td>
                          <td className="py-2 px-3 text-xs text-white font-dm-sans">{c.name}</td>
                          <td className="py-2 px-3">
                            <span className="text-xs font-mono" style={{ color: MANAGER_COLORS[c.manager] ?? '#888' }}>{c.manager}</span>
                          </td>
                          <td className="py-2 px-3"><TierChip tier={c.tier} /></td>
                          <td className="py-2 px-3 text-xs font-mono text-white">{fmt(c.diamonds)}</td>
                          <td className="py-2 px-3 text-xs font-mono text-green-400">${fmt(c.rewards)}</td>
                          <td className="py-2 px-3">
                            <span className="text-xl font-bebas" style={{ color: r.color }}>{c.ratio.toFixed(2)}</span>
                          </td>
                          <td className="py-2 px-3">
                            <span className="text-[10px] font-mono px-1.5 py-0.5 rounded"
                              style={{ background: `${r.color}22`, color: r.color }}>
                              {r.label}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }
    app/components/pages/sensitivity-page.tsx: >
      import { useMemo } from 'react';

      import { CREATORS } from '../../data/creators';

      import { BarChart, Bar, XAxis, YAxis, ResponsiveContainer, Tooltip, Cell,
      ReferenceLine } from 'recharts';


      function fmt(n: number) {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(1)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }


      const FLOOR = 5_000_000;


      export function SensitivityPage() {
        const sorted = useMemo(() => [...CREATORS].sort((a, b) => b.diamonds - a.diamonds), []);
        const total = CREATORS.reduce((s, c) => s + c.diamonds, 0);
        const totalRev = CREATORS.reduce((s, c) => s + c.rewards, 0);

        const scenarios = useMemo(() => [
          { label: 'Current', diamonds: total, color: '#22c55e' },
          { label: 'Lose Top 1', diamonds: total - sorted.slice(0, 1).reduce((s, c) => s + c.diamonds, 0), color: '#f59e0b' },
          { label: 'Lose Top 5', diamonds: total - sorted.slice(0, 5).reduce((s, c) => s + c.diamonds, 0), color: '#f97316' },
          { label: 'Lose Top 10', diamonds: total - sorted.slice(0, 10).reduce((s, c) => s + c.diamonds, 0), color: '#ef4444' },
          {
            label: 'No Carrington',
            diamonds: total - CREATORS.filter(c => c.manager === 'CARRINGTON').reduce((s, c) => s + c.diamonds, 0),
            color: '#7f1d1d',
          },
        ], [sorted, total]);

        const mvaCost = useMemo(() => {
          let cumulative = 0;
          let i = sorted.length - 1;
          while (cumulative < totalRev - FLOOR * 5 && i >= 0) {
            cumulative += sorted[i].rewards;
            i--;
          }
          return sorted.length - i - 1;
        }, [sorted, totalRev]);

        return (
          <div className="space-y-5">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              {[
                { label: 'Total Diamonds', value: fmt(total), color: '#fff' },
                { label: 'Total Revenue', value: `$${fmt(totalRev)}`, color: '#22c55e' },
                { label: 'Floor Threshold', value: `$${fmt(FLOOR * 5)}`, color: '#f59e0b' },
                { label: 'Min Viable Creators', value: String(mvaCost), color: '#ef4444' },
              ].map(s => (
                <div key={s.label} className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4 card-hover">
                  <div className="text-[10px] font-mono text-gray-600">{s.label}</div>
                  <div className="text-2xl font-bebas" style={{ color: s.color }}>{s.value}</div>
                </div>
              ))}
            </div>

            {/* Waterfall */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded card-hover overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">REVENUE SENSITIVITY — SCENARIO WATERFALL</span>
              </div>
              <div className="p-4" style={{ height: 280 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={scenarios} margin={{ top: 20, right: 20, bottom: 20, left: 50 }}>
                    <XAxis dataKey="label" tick={{ fontSize: 10, fill: '#888', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fontSize: 9, fill: '#555', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} tickFormatter={v => fmt(v)} />
                    <Tooltip
                      contentStyle={{ background: '#111', border: '1px solid #333', borderRadius: 4, fontSize: 11 }}
                      formatter={(v: number) => [fmt(v), 'Diamonds']}
                    />
                    <Bar dataKey="diamonds" radius={[3, 3, 0, 0]}>
                      {scenarios.map((s, i) => <Cell key={i} fill={s.color} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* Scenario table */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">SCENARIO BREAKDOWN</span>
              </div>
              <table className="w-full">
                <thead>
                  <tr className="text-[10px] font-mono text-gray-600 border-b border-[#111] bg-[#0a0a0a]">
                    <th className="py-2 px-4 text-left">SCENARIO</th>
                    <th className="py-2 px-4 text-left">REMAINING ◆</th>
                    <th className="py-2 px-4 text-left">IMPACT</th>
                    <th className="py-2 px-4 text-left">% LOSS</th>
                  </tr>
                </thead>
                <tbody>
                  {scenarios.map(s => {
                    const loss = total - s.diamonds;
                    const pct = ((loss / total) * 100).toFixed(1);
                    return (
                      <tr key={s.label} className="border-b border-[#111] hover:bg-[#ff0044]/5 transition-colors">
                        <td className="py-2 px-4 text-xs font-dm-sans" style={{ color: s.color }}>{s.label}</td>
                        <td className="py-2 px-4 text-xs font-mono text-white">{fmt(s.diamonds)}</td>
                        <td className="py-2 px-4 text-xs font-mono text-red-400">{loss > 0 ? `-${fmt(loss)}` : '—'}</td>
                        <td className="py-2 px-4 text-xs font-mono" style={{ color: parseFloat(pct) > 10 ? '#ef4444' : '#f59e0b' }}>
                          {parseFloat(pct) > 0 ? `-${pct}%` : '—'}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      }
    app/components/pages/genre-portfolio-page.tsx: >
      import { useMemo } from 'react';

      import { CREATORS } from '../../data/creators';

      import { RadarChart, Radar, PolarGrid, PolarAngleAxis,
      ResponsiveContainer, Tooltip, Legend } from 'recharts';


      function fmt(n: number) {
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }


      const GENRE_COLORS =
      ['#ff0044','#f97316','#a855f7','#06b6d4','#84cc16','#ec4899','#14b8a6','#f59e0b','#6366f1','#10b981'];


      export function GenrePortfolioPage() {
        const genres = useMemo(() => {
          const map = new Map<string, typeof CREATORS>();
          CREATORS.filter(c => c.diamonds > 0).forEach(c => {
            if (!map.has(c.badge)) map.set(c.badge, []);
            map.get(c.badge)!.push(c);
          });
          return Array.from(map.entries()).map(([genre, creators], i) => ({
            genre, color: GENRE_COLORS[i % GENRE_COLORS.length],
            count: creators.length,
            avgDiamonds: Math.round(creators.reduce((s, c) => s + c.diamonds, 0) / creators.length),
            avgHours: Math.round(creators.reduce((s, c) => s + c.hours, 0) / creators.length),
            avgScore: Math.round(creators.reduce((s, c) => s + c.score, 0) / creators.length),
            avgRatio: parseFloat((creators.reduce((s, c) => s + (c.diamonds > 0 ? c.rewards / c.diamonds : 0), 0) / creators.length).toFixed(2)),
          })).sort((a, b) => b.avgDiamonds - a.avgDiamonds);
        }, []);

        const maxDiamonds = Math.max(...genres.map(g => g.avgDiamonds));

        const radarData = useMemo(() => [
          'avgDiamonds', 'avgHours', 'avgScore', 'avgRatio',
        ].map(key => {
          const obj: Record<string, number | string> = { metric: key.replace('avg', '').replace('Diamonds', 'Diamonds').replace('Hours', 'Hours') };
          genres.forEach(g => { obj[g.genre] = (g as unknown as Record<string, number>)[key]; });
          return obj;
        }), [genres]);

        return (
          <div className="space-y-5">
            {/* Genre stat cards */}
            <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
              {genres.map(g => (
                <div key={g.genre} className="bg-[#0d0d0d] border border-[#1a1a1a] rounded p-3 card-hover">
                  <div className="text-xs font-bebas mb-1" style={{ color: g.color }}>{g.genre}</div>
                  <div className="text-lg font-bebas text-white">{g.count}</div>
                  <div className="text-[9px] font-mono text-gray-600">creators</div>
                  <div className="mt-2 space-y-0.5">
                    <div className="flex justify-between text-[9px] font-mono"><span className="text-gray-600">AVG ◆</span><span className="text-gray-300">{fmt(g.avgDiamonds)}</span></div>
                    <div className="flex justify-between text-[9px] font-mono"><span className="text-gray-600">AVG HRS</span><span className="text-gray-300">{g.avgHours}h</span></div>
                    <div className="flex justify-between text-[9px] font-mono"><span className="text-gray-600">AVG SCORE</span><span className="text-gray-300">{g.avgScore}</span></div>
                    <div className="flex justify-between text-[9px] font-mono"><span className="text-gray-600">RATIO</span><span className="text-amber-400">{g.avgRatio.toFixed(1)}x</span></div>
                  </div>
                  <div className="mt-2 h-1 bg-[#1a1a1a] rounded-full overflow-hidden">
                    <div className="h-full rounded-full" style={{ width: `${(g.avgDiamonds / maxDiamonds) * 100}%`, background: g.color }} />
                  </div>
                </div>
              ))}
            </div>

            {/* Radar chart */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded card-hover overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">GENRE COMPARISON RADAR</span>
              </div>
              <div className="p-4" style={{ height: 360 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <RadarChart data={radarData} margin={{ top: 20, right: 40, bottom: 20, left: 40 }}>
                    <PolarGrid stroke="#1a1a1a" />
                    <PolarAngleAxis dataKey="metric" tick={{ fontSize: 10, fill: '#555', fontFamily: 'DM Mono' }} />
                    <Tooltip contentStyle={{ background: '#111', border: '1px solid #333', borderRadius: 4, fontSize: 11 }} />
                    {genres.slice(0, 5).map(g => (
                      <Radar key={g.genre} name={g.genre} dataKey={g.genre} stroke={g.color} fill={g.color} fillOpacity={0.1} />
                    ))}
                    <Legend wrapperStyle={{ fontSize: 10, fontFamily: 'DM Mono' }} />
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* Table */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-[10px] font-mono text-gray-600 border-b border-[#111] bg-[#0a0a0a]">
                      <th className="py-2 px-4 text-left">GENRE</th>
                      <th className="py-2 px-4 text-left">CREATORS</th>
                      <th className="py-2 px-4 text-left">AVG ◆</th>
                      <th className="py-2 px-4 text-left">AVG HOURS</th>
                      <th className="py-2 px-4 text-left">AVG SCORE</th>
                      <th className="py-2 px-4 text-left">AVG RATIO</th>
                      <th className="py-2 px-4 text-left">RECOMMENDATION</th>
                    </tr>
                  </thead>
                  <tbody>
                    {genres.map(g => (
                      <tr key={g.genre} className="border-b border-[#111] hover:bg-[#ff0044]/5 transition-colors">
                        <td className="py-2 px-4">
                          <span className="text-xs font-bebas" style={{ color: g.color }}>{g.genre}</span>
                        </td>
                        <td className="py-2 px-4 text-xs font-mono text-gray-400">{g.count}</td>
                        <td className="py-2 px-4 text-xs font-mono text-white font-bold">{fmt(g.avgDiamonds)}</td>
                        <td className="py-2 px-4 text-xs font-mono text-gray-400">{g.avgHours}h</td>
                        <td className="py-2 px-4 text-xs font-mono" style={{ color: g.avgScore >= 60 ? '#22c55e' : g.avgScore >= 40 ? '#f59e0b' : '#ef4444' }}>{g.avgScore}</td>
                        <td className="py-2 px-4">
                          <span className="text-xs font-mono" style={{ color: g.avgRatio >= 3 ? '#fbbf24' : g.avgRatio >= 1 ? '#d1d5db' : '#555' }}>{g.avgRatio.toFixed(1)}x</span>
                        </td>
                        <td className="py-2 px-4 text-[10px] font-mono text-gray-500">
                          {g.avgDiamonds === Math.max(...genres.map(x => x.avgDiamonds)) ? '✅ RECRUIT MORE' :
                            g.avgScore < 40 ? '⚠️ TRAINING NEEDED' :
                            g.avgRatio >= 3 ? '💎 HIGH LOYALTY' : '—'}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }
    app/components/pages/consistency-page.tsx: >
      import { useMemo } from 'react';

      import { CREATORS, MANAGER_COLORS } from '../../data/creators';

      import type { Creator } from '../../types';

      import { ScatterChart, Scatter, XAxis, YAxis, ResponsiveContainer,
      Tooltip, Cell, ReferenceLine } from 'recharts';


      interface Props { onCreatorClick: (c: Creator) => void; }


      function fmt(n: number) {
        if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
        if (n >= 1_000) return `${(n / 1_000).toFixed(0)}K`;
        return String(n);
      }


      function consistencyIndex(c: Creator): number {
        if (c.daysStreamed === 0) return 0;
        const expectedDays = c.daysStreamed;
        const ideal = 28 / 4 * 4; // 4 days/week = 16 days
        const regularity = Math.min(100, Math.round((c.daysStreamed / ideal) * 100));
        const volPenalty = c.prevMonth > 0 ? Math.abs(c.last30Days - c.prevMonth) / c.prevMonth : 0;
        return Math.max(0, Math.min(100, Math.round(regularity * (1 - volPenalty * 0.5))));
      }


      export function ConsistencyPage({ onCreatorClick }: Props) {
        const active = useMemo(() => CREATORS.filter(c => c.diamonds > 0 && c.hours > 0), []);

        const points = useMemo(() => active.map(c => ({
          x: consistencyIndex(c), y: c.diamonds, creator: c, name: c.name,
        })), [active]);

        const correlation = useMemo(() => {
          const n = points.length;
          if (n < 2) return 0;
          const meanX = points.reduce((s, p) => s + p.x, 0) / n;
          const meanY = points.reduce((s, p) => s + p.y, 0) / n;
          const num = points.reduce((s, p) => s + (p.x - meanX) * (p.y - meanY), 0);
          const denX = Math.sqrt(points.reduce((s, p) => s + (p.x - meanX) ** 2, 0));
          const denY = Math.sqrt(points.reduce((s, p) => s + (p.y - meanY) ** 2, 0));
          return denX * denY > 0 ? parseFloat((num / (denX * denY)).toFixed(3)) : 0;
        }, [points]);

        const medX = useMemo(() => {
          const s = [...points].sort((a, b) => a.x - b.x);
          return s[Math.floor(s.length / 2)]?.x ?? 50;
        }, [points]);

        const ranked = useMemo(() => [...active].map(c => ({ ...c, ci: consistencyIndex(c) })).sort((a, b) => b.ci - a.ci), [active]);

        return (
          <div className="space-y-5">
            <div className="grid grid-cols-3 gap-4">
              <div className="col-span-1 bg-[#0d0d0d] border border-[#1a1a1a] rounded p-5 card-hover flex flex-col items-center justify-center">
                <div className="text-[10px] font-mono text-gray-600 mb-1">CORRELATION COEFFICIENT</div>
                <div className="text-5xl font-bebas" style={{ color: correlation > 0.3 ? '#22c55e' : correlation > 0 ? '#f59e0b' : '#ef4444' }}>
                  {correlation > 0 ? '+' : ''}{correlation}
                </div>
                <div className="text-[10px] font-mono text-gray-500 mt-1">
                  {correlation > 0.5 ? 'STRONG POSITIVE' : correlation > 0.3 ? 'MODERATE POSITIVE' : 'WEAK'}
                </div>
                <div className="text-[10px] font-dm-sans text-gray-600 mt-2 text-center">
                  Consistent streamers earn {correlation > 0 ? 'more' : 'similar'} diamonds for same hours
                </div>
              </div>
              <div className="col-span-2 bg-[#0d0d0d] border border-[#1a1a1a] rounded p-4">
                <div className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2">CONSISTENCY INSIGHT</div>
                <p className="text-xs font-dm-sans text-gray-400 leading-relaxed">
                  The consistency index measures how regularly creators stream across the month. A score of 100 means
                  perfectly distributed streaming days. The correlation between consistency and diamond earnings
                  ({correlation > 0 ? 'r = +' : 'r = '}{correlation}) {correlation > 0.3 ? 'confirms' : 'suggests'} that
                  schedule discipline drives performance. Show this to creators to motivate consistent streaming schedules.
                </p>
              </div>
            </div>

            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded card-hover overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">CONSISTENCY vs DIAMONDS SCATTER</span>
              </div>
              <div className="p-4" style={{ height: 340 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <ScatterChart margin={{ top: 10, right: 20, bottom: 20, left: 40 }}>
                    <XAxis dataKey="x" name="Consistency" type="number" domain={[0, 100]} tick={{ fontSize: 10, fill: '#555', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} label={{ value: 'Consistency Index', position: 'insideBottom', fill: '#555', fontSize: 10 }} />
                    <YAxis dataKey="y" name="Diamonds" type="number" tick={{ fontSize: 9, fill: '#555', fontFamily: 'DM Mono' }} axisLine={false} tickLine={false} tickFormatter={v => fmt(v)} />
                    <ReferenceLine x={medX} stroke="#333" strokeDasharray="4 2" label={{ value: 'Median', fill: '#444', fontSize: 9 }} />
                    <Tooltip
                      content={({ active: a, payload }) => {
                        if (!a || !payload?.[0]) return null;
                        const d = payload[0].payload;
                        return (
                          <div className="bg-[#111] border border-[#333] rounded p-2 text-[10px] font-mono">
                            <div className="text-white">{d.name}</div>
                            <div className="text-gray-400">CI: {d.x} · {fmt(d.y)} ◆</div>
                          </div>
                        );
                      }}
                    />
                    <Scatter data={points} onClick={d => onCreatorClick(d.creator)}>
                      {points.map((p, i) => (
                        <Cell key={i} fill={p.x >= medX ? '#ff0044' : '#444'} fillOpacity={0.7} />
                      ))}
                    </Scatter>
                  </ScatterChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* Rankings */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a]">
                <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">CONSISTENCY RANKING</span>
              </div>
              <table className="w-full">
                <thead>
                  <tr className="text-[10px] font-mono text-gray-600 border-b border-[#111] bg-[#0a0a0a]">
                    <th className="py-2 px-3 text-center w-8">#</th>
                    <th className="py-2 px-3 text-left">CREATOR</th>
                    <th className="py-2 px-3 text-left">MANAGER</th>
                    <th className="py-2 px-3 text-left">CONSISTENCY</th>
                    <th className="py-2 px-3 text-left">DAYS STREAMED</th>
                    <th className="py-2 px-3 text-left">DIAMONDS</th>
                  </tr>
                </thead>
                <tbody>
                  {ranked.slice(0, 30).map((c, i) => (
                    <tr key={c.id} className="border-b border-[#111] hover:bg-[#ff0044]/5 cursor-pointer transition-colors" onClick={() => onCreatorClick(c)}>
                      <td className="py-2 px-3 text-xs font-mono text-gray-600 text-center">{i + 1}</td>
                      <td className="py-2 px-3 text-xs text-white font-dm-sans">{c.name}</td>
                      <td className="py-2 px-3">
                        <span className="text-xs font-mono" style={{ color: MANAGER_COLORS[c.manager] ?? '#888' }}>{c.manager}</span>
                      </td>
                      <td className="py-2 px-3">
                        <div className="flex items-center gap-2">
                          <div className="w-16 h-1.5 bg-[#1a1a1a] rounded-full overflow-hidden">
                            <div className="h-full rounded-full bg-[#ff0044]" style={{ width: `${c.ci}%` }} />
                          </div>
                          <span className="text-[10px] font-mono text-[#ff0044]">{c.ci}</span>
                        </div>
                      </td>
                      <td className="py-2 px-3 text-xs font-mono text-gray-400">{c.daysStreamed} days</td>
                      <td className="py-2 px-3 text-xs font-mono text-white font-bold">{fmt(c.diamonds)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

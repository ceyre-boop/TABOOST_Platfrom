    initial.md: >
      # Requirements

      ## Summary

      An Education Management Dashboard that centralizes student performance
      tracking, academic program oversight, and operational coordination for
      administrators, educators, and coordinators. The system provides
      comprehensive student profiles with academic records and participation
      insights, visual academic progress tracking with comparative analytics,
      program management tools for curriculum and enrollment workflows, and a
      collaborative task tracker for assignments and projects. This solution
      enables data-driven decision-making and improves campus-wide coordination.


      ## Use cases

      - Dashboard Shell & Student Profiles
        1) User navigates to the application and sees the main dashboard shell with navigation to all sections
        2) User clicks on Student Profiles section
        3) System displays a searchable/filterable list of students with key information
        4) User selects a specific student to view detailed profile
        5) System shows comprehensive academic records, grades, participation data, and activity history
        6) User can filter students by grade level, performance status, or enrollment status

      - Academic Progress Tracking
        1) User navigates to Academic Progress section
        2) System displays visual graphs showing performance trends over time
        3) User can filter by student, class, subject, or term
        4) System shows comparison tables across different terms and subjects
        5) User identifies strengths and gaps through color-coded performance indicators
        6) User can drill down into specific metrics for detailed analysis

      - Program Management
        1) User navigates to Program Management section
        2) System displays active curriculum programs with status indicators
        3) User views enrollment workflows with pending/approved/completed states
        4) User accesses teacher training initiatives with progress tracking
        5) User can create or update program details
        6) System shows program analytics and participation metrics

      - Task & Project Tracker
        1) User navigates to Tasks & Projects section
        2) System displays all assignments and deadlines in a filterable view
        3) User can view tasks by status (pending, in progress, completed, overdue)
        4) User assigns tasks to team members or students
        5) System shows progress monitoring with completion percentages
        6) User can add comments for team collaboration
        7) System provides mock real-time updates on task status changes

      ## Plan

      ### Dashboard Shell & Student Profiles

      1. [x] Create application shell with responsive navigation sidebar
      containing links to Student Profiles, Academic Progress, Program
      Management, and Tasks & Projects sections

      2. [x] Build Student Profiles list page with search bar and filters for
      grade level, performance status, and enrollment status

      3. [x] Generate mock data for 50 students including names, student IDs,
      grade levels, enrollment status, and performance metrics

      4. [x] Create student profile card components displaying key information
      in a grid layout

      5. [x] Implement detailed student profile view with tabs for Academic
      Records, Grades, Participation, and Activity History

      6. [x] Add visual indicators for performance status (excellent, good,
      needs improvement) with color coding


      ### Academic Progress Tracking

      1. [x] Build Academic Progress page layout with filter controls for
      student, class, subject, and term selection

      2. [x] Generate mock academic performance data spanning multiple terms and
      subjects

      3. [x] Create line charts showing performance trends over time using chart
      library

      4. [x] Build comparison tables displaying term-over-term and
      subject-over-subject performance

      5. [x] Implement color-coded performance indicators (green for strengths,
      yellow for average, red for gaps)

      6. [x] Add drill-down functionality to view detailed metrics for specific
      data points


      ### Program Management

      1. [x] Create Program Management page with card-based layout for different
      program types

      2. [x] Generate mock data for curriculum development programs, enrollment
      workflows, and teacher training initiatives

      3. [x] Implement status indicators (planning, active, completed, on-hold)
      with visual badges

      4. [x] Build enrollment workflow tracker showing pending, approved, and
      completed enrollments

      5. [x] Create teacher training progress cards with completion percentages
      and participant counts

      6. [x] Add program analytics section with enrollment trends and
      participation metrics


      ### Task & Project Tracker

      1. [x] Build Tasks & Projects page with filterable task list (by status,
      assignee, due date, priority)

      2. [x] Generate mock task data including assignments, deadlines,
      assignees, status, and progress percentages

      3. [x] Create task cards with deadline countdown, progress bars, and team
      member avatars

      4. [x] Implement status management allowing users to update task status
      via dropdown or drag-and-drop

      5. [x] Add task assignment interface to assign tasks to team members or
      student groups

      6. [x] Build collaboration panel with comment threads and activity feed

      7. [x] Implement mock real-time updates simulation showing status changes
      with notifications

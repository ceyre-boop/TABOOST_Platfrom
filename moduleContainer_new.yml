      const subjects = ['Mathematics', 'English Literature', 'Physics',
      'Chemistry', 'Biology', 'History', 'Geography', 'Computer Science'];

      const terms = ['Fall 2023', 'Spring 2024', 'Fall 2024'];

      const teachers = ['Dr. Anderson', 'Prof. Martinez', 'Ms. Johnson', 'Mr.

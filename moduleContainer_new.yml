                  </div>
                </div>
              </div>
            </div>

            {/* Diamond Equity Curve */}
            <div className="bg-[#0d0d0d] border border-[#1a1a1a] rounded card-hover overflow-hidden">
              <div className="px-4 py-3 border-b border-[#1a1a1a] flex items-center justify-between">

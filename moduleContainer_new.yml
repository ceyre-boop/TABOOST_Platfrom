    index.css: >
      @import
      url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');


      @tailwind base;

      @tailwind components;

      @tailwind utilities;


      :root {
        font-family: 'DM Sans', system-ui, sans-serif;
        color-scheme: dark;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }


      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background-color: #080808;
        color: #f0f0f0;
        overflow-x: hidden;
      }


      button { border-radius: 4px; }


      .font-bebas { font-family: 'Bebas Neue', sans-serif; }

      .font-mono-dm { font-family: 'DM Mono', monospace; }

      .font-dm-sans { font-family: 'DM Sans', sans-serif; }


      @keyframes ticker-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .ticker-scroll { animation: ticker-scroll 60s linear infinite; }


      @keyframes pulse-dot {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
        50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
      }

      .live-dot { animation: pulse-dot 2s ease-in-out infinite; }


      @keyframes pulse-red-dot {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,0,68,0.7); }
        50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(255,0,68,0); }
      }

      .risk-dot { animation: pulse-red-dot 1.5s ease-in-out infinite; }


      @keyframes heartbeat {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      .heartbeat { animation: heartbeat 2s ease-in-out infinite; }


      @keyframes shimmer {
        0% { background-position: 200% center; }
        100% { background-position: -200% center; }
      }

      .shimmer-bar {
        background: linear-gradient(90deg, #ff0044 0%, #fbbf24 40%, #ff0044 80%, #fbbf24 100%);
        background-size: 200% auto;
        animation: shimmer 2s linear infinite;
      }


      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 15px rgba(255,0,68,0.3); }
        50% { box-shadow: 0 0 30px rgba(255,0,68,0.6); }
      }

      .red-glow { animation: glow-pulse 3s ease-in-out infinite; }


      .card-hover {
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        border-top: 2px solid transparent;
      }

      .card-hover:hover {
        border-top-color: #ff0044;
        box-shadow: 0 0 20px rgba(255,0,68,0.15);
      }


      .ambient-bg {
        background: 
          radial-gradient(ellipse at 0% 0%, rgba(255,0,68,0.06) 0%, transparent 50%),
          radial-gradient(ellipse at 100% 100%, rgba(255,0,68,0.06) 0%, transparent 50%),
          #080808;
        min-height: 100vh;
      }


      @layer base {
        * { @apply border-border; }
        body { background: #080808; color: #f0f0f0; }
        :root {
          --background: 0 0% 3%;
          --foreground: 0 0% 94%;
          --card: 0 0% 6%;
          --card-foreground: 0 0% 94%;
          --popover: 0 0% 6%;
          --popover-foreground: 0 0% 94%;
          --primary: 348 100% 50%;
          --primary-foreground: 0 0% 100%;
          --secondary: 0 0% 10%;
          --secondary-foreground: 0 0% 94%;
          --muted: 0 0% 12%;
          --muted-foreground: 0 0% 50%;
          --accent: 0 0% 10%;
          --accent-foreground: 0 0% 94%;
          --destructive: 348 100% 50%;
          --destructive-foreground: 0 0% 100%;
          --border: 0 0% 12%;
          --input: 0 0% 12%;
          --ring: 348 100% 50%;
          --radius: 0.25rem;
        }
      }

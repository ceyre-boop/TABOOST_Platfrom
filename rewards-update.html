<!DOCTYPE html>
<html>
<head>
    <title>TABOOST - Rewards Data Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        .drop-zone {
            background: rgba(255,255,255,0.03);
            border: 3px dashed #444;
            border-radius: 20px;
            padding: 50px 40px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
        }
        .drop-zone:hover { border-color: #ffd700; }
        .drop-zone.processing { border-color: #f59e0b; }
        .drop-zone.ready { border-color: #22c55e; }
        .drop-icon { font-size: 48px; margin-bottom: 15px; }
        
        .btn {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            display: none;
        }
        .btn.visible { display: inline-block; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .log.visible { display: block; }
        .log-line { margin: 5px 0; }
        .log-success { color: #22c55e; }
        .log-error { color: #ff4444; }
        .log-info { color: #888; }
        
        .token-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            display: none;
        }
        .token-section.visible { display: block; }
        .token-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ffd700;
        }
        .token-section input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 8px;
        }
        .token-section small {
            color: #666;
            font-size: 12px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">REWARDS UPDATE</div>
        <p class="subtitle">Upload rewards CSV to update creator earnings history</p>
        
        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">📊</div>
            <div id="dropText">Drop your rewards CSV file here</div>
            <input type="file" id="fileInput" accept=".csv" style="display:none">
        </div>
        
        <div class="token-section" id="tokenSection">
            <label>GitHub Personal Access Token</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="checkReady()">
            <small>Create one at: GitHub → Settings → Developer settings → Personal access tokens</small>
        </div>
        
        <button class="btn" id="downloadBtn">Download data.js</button>
        <button class="btn" id="autoBtn" disabled>Auto-Upload to GitHub</button>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const REPO_OWNER = 'ceyre-boop';
        const REPO_NAME = 'TABOOST_Platfrom';
        const FILE_PATH = 'js/data.js';
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropText = document.getElementById('dropText');
        const downloadBtn = document.getElementById('downloadBtn');
        const autoBtn = document.getElementById('autoBtn');
        const tokenSection = document.getElementById('tokenSection');
        const githubToken = document.getElementById('githubToken');
        const logEl = document.getElementById('log');
        
        let csvContent = null;
        let dataJsContent = null;
        
        function log(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.innerHTML = msg;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
            logEl.classList.add('visible');
        }
        
        // Parse CSV line handling quoted fields
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }
        
        // Parse rewards CSV and update earningsHistory
        function parseRewardsCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return null;
            
            const headers = parseCSVLine(lines[0]);
            
            // Find column indices
            const usernameIdx = headers.indexOf('3/17');
            if (usernameIdx === -1) {
                log('❌ Error: Could not find 3/17 column', 'error');
                return null;
            }
            
            // Parse earnings history for each creator
            const earningsMap = {};
            
            for (let i = 1; i < lines.length; i++) {
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 41) continue;
                
                const username = cols[usernameIdx];
                if (!username || username.includes('/') || username.includes('@')) continue;
                
                // Map columns based on your CSV structure
                // DIAMONDS: indices 3-8
                // REWARDS: indices 20-26  
                // REVENUE: indices 27-33
                // BONUS: indices 34-40
                earningsMap[username.toLowerCase()] = [
                    { period: 'February 2026', diamonds: parseInt(cols[3]?.replace(/,/g, '')) || 0, revenue: cols[27] || '$0.00', rewards: parseInt(cols[20]?.replace(/,/g, '')) || 0 },
                    { period: 'January 2026', diamonds: parseInt(cols[4]?.replace(/,/g, '')) || 0, revenue: cols[28] || '$0.00', rewards: parseInt(cols[21]?.replace(/,/g, '')) || 0 },
                    { period: 'December 2025', diamonds: parseInt(cols[5]?.replace(/,/g, '')) || 0, revenue: cols[29] || '$0.00', rewards: parseInt(cols[22]?.replace(/,/g, '')) || 0 },
                    { period: 'November 2025', diamonds: parseInt(cols[6]?.replace(/,/g, '')) || 0, revenue: cols[30] || '$0.00', rewards: parseInt(cols[23]?.replace(/,/g, '')) || 0 },
                    { period: 'October 2025', diamonds: parseInt(cols[7]?.replace(/,/g, '')) || 0, revenue: cols[31] || '$0.00', rewards: parseInt(cols[24]?.replace(/,/g, '')) || 0 },
                    { period: 'September 2025', diamonds: parseInt(cols[8]?.replace(/,/g, '')) || 0, revenue: cols[32] || '$0.00', rewards: parseInt(cols[25]?.replace(/,/g, '')) || 0 }
                ];
            }
            
            return earningsMap;
        }
        
        // Fetch existing data.js
        async function fetchExistingData() {
            try {
                log('📡 Fetching existing data.js...');
                const response = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}?t=${Date.now()}`);
                if (!response.ok) throw new Error('Failed to fetch');
                return await response.text();
            } catch (e) {
                log('⚠️ Could not fetch existing data, will create new', 'info');
                return null;
            }
        }
        
        // Merge earnings history into existing data
        function mergeEarningsHistory(existingData, earningsMap) {
            let data = existingData;
            let updated = 0;
            
            // Find each creator and update their earningsHistory
            for (const [username, history] of Object.entries(earningsMap)) {
                const pattern = new RegExp(`"username": "${username}"([\\s\\S]*?)("earningsHistory": \\[[^\\]]*\\]|"rewardsMonth")`, 'i');
                
                if (pattern.test(data)) {
                    // Check if earningsHistory exists
                    const hasHistory = data.match(new RegExp(`"username": "${username}"[\\s\\S]*?"earningsHistory"`));
                    
                    if (hasHistory) {
                        // Replace existing earningsHistory
                        data = data.replace(
                            new RegExp(`("username": "${username}"[\\s\\S]*?"earningsHistory": )\\[[^\\]]*\\]`),
                            `$1${JSON.stringify(history)}`
                        );
                    } else {
                        // Add new earningsHistory before rewardsMonth
                        data = data.replace(
                            new RegExp(`("username": "${username}"[\\s\\S]*?)("rewardsMonth")`),
                            `$1"earningsHistory": ${JSON.stringify(history)},\n    $2`
                        );
                    }
                    updated++;
                }
            }
            
            return { data, updated };
        }
        
        // Process file
        async function processFile(file) {
            if (!file.name.endsWith('.csv')) {
                alert('Please upload a CSV file');
                return;
            }
            
            dropZone.classList.add('processing');
            log('📄 Reading CSV...');
            
            const text = await file.text();
            csvContent = text;
            
            log('🔍 Parsing rewards data...');
            const earningsMap = parseRewardsCSV(text);
            
            if (!earningsMap) {
                log('❌ Failed to parse CSV', 'error');
                dropZone.classList.remove('processing');
                return;
            }
            
            log(`✅ Parsed ${Object.keys(earningsMap).length} creators`);
            
            // Fetch and merge with existing data
            log('📡 Fetching existing data.js...');
            const existingData = await fetchExistingData();
            
            if (existingData) {
                log('🔄 Merging with existing data...');
                const result = mergeEarningsHistory(existingData, earningsMap);
                dataJsContent = result.data;
                log(`✅ Updated ${result.updated} creators`, 'success');
            } else {
                // Create minimal data.js structure
                const timestamp = new Date().toISOString();
                const creators = Object.entries(earningsMap).map(([username, history], i) => ({
                    id: i + 1,
                    username: username,
                    name: username,
                    email: username + '@taboost.me',
                    earningsHistory: history
                }));
                
                dataJsContent = `// Taboost Agency - Complete Creator Data\n`;
                dataJsContent += `// Generated: ${timestamp}\n\n`;
                dataJsContent += `const creatorsData = ${JSON.stringify(creators, null, 2)};\n\n`;
                dataJsContent += `const taboostData = {\n`;
                dataJsContent += `  creators: creatorsData,\n`;
                dataJsContent += `  lastUpdated: "${timestamp}",\n`;
                dataJsContent += `  getAllCreators: function() { return this.creators; },\n`;
                dataJsContent += `  getCreator: function(username) { return this.creators.find(c => c.username === username.toLowerCase()); },\n`;
                dataJsContent += `  loadFromCSV: async function() { return this.creators; }\n`;
                dataJsContent += `};`;
            }
            
            dropZone.classList.remove('processing');
            dropZone.classList.add('ready');
            dropText.textContent = 'Rewards data ready!';
            downloadBtn.classList.add('visible');
            tokenSection.classList.add('visible');
            autoBtn.classList.add('visible');
            checkReady();
        }
        
        function checkReady() {
            const token = githubToken.value;
            autoBtn.disabled = !token;
        }
        
        async function autoUpload() {
            const token = githubToken.value;
            if (!token || !dataJsContent) return;
            
            autoBtn.disabled = true;
            log('<span class="spinner"></span>Starting upload...', 'info');
            
            try {
                // 1. Get current file SHA
                log('📡 Checking current data.js...');
                let sha = null;
                try {
                    const checkRes = await fetch(
                        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
                        { headers: { 'Authorization': `token ${token}` } }
                    );
                    if (checkRes.ok) {
                        const data = await checkRes.json();
                        sha = data.sha;
                    }
                } catch (e) {}
                
                // 2. Upload new data.js
                log('📤 Uploading new data.js...');
                const content = btoa(unescape(encodeURIComponent(dataJsContent)));
                const body = {
                    message: `Update rewards data - ${new Date().toLocaleDateString()}`,
                    content: content,
                    branch: 'main'
                };
                if (sha) body.sha = sha;
                
                const uploadRes = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    }
                );
                
                if (!uploadRes.ok) {
                    const errorText = await uploadRes.text();
                    log('❌ GitHub API Error: ' + errorText, 'error');
                    throw new Error(`Upload failed: ${uploadRes.status}`);
                }
                
                const uploadData = await uploadRes.json();
                log('✅ Data.js uploaded! Commit: ' + uploadData.commit.sha.substring(0, 7), 'success');
                log('🔗 ' + uploadData.content.html_url, 'info');
                
            } catch (err) {
                log('❌ Upload failed: ' + err.message, 'error');
            } finally {
                autoBtn.disabled = false;
                checkReady();
            }
        }
        
        // Auto-upload button
        autoBtn.addEventListener('click', autoUpload);
        
        // Download button
        downloadBtn.addEventListener('click', () => {
            if (!dataJsContent) return;
            
            const blob = new Blob([dataJsContent], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.js';
            a.click();
            URL.revokeObjectURL(url);
            
            log('✅ Downloaded data.js', 'success');
        });
        
        // File drop handlers
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#ffd700'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#444'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#444';
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });
    </script>
</body>
</html>

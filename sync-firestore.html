<!DOCTYPE html>
<html>
<head>
    <title>TABOOST - Sync to Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0044, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .btn {
            background: linear-gradient(135deg, #ff0044, #ff6b6b);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 20px 0;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .status.visible { display: block; }
        .success { color: #22c55e; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TABOOST</div>
        <p style="color:#888; margin-bottom:30px;">Sync Creator Data to Firestore</p>
        
        <p style="color:#aaa; margin-bottom:20px;">
            This will sync all creator data to Firestore so the login system can find emails.
        </p>
        
        <button class="btn" id="syncBtn" onclick="startSync()">🔄 Sync to Firestore</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(msg, type) {
            const status = document.getElementById('status');
            status.classList.add('visible');
            const div = document.createElement('div');
            div.className = type || '';
            div.textContent = msg;
            status.appendChild(div);
            status.scrollTop = status.scrollHeight;
        }

        async function startSync() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            
            log('🔄 Starting sync...');
            
            try {
                // Fetch the current data.js
                log('📡 Loading creator data...');
                const response = await fetch('js/data.js?v=' + Date.now());
                const scriptText = await response.text();
                
                // Execute to get creatorsData
                eval(scriptText);
                
                if (!creatorsData || !creatorsData.length) {
                    throw new Error('No creator data found');
                }
                
                log(`✅ Loaded ${creatorsData.length} creators`);
                
                // Sync to Firestore in batches
                const BATCH_SIZE = 400;
                for (let i = 0; i < creatorsData.length; i += BATCH_SIZE) {
                    const batch = db.batch();
                    const chunk = creatorsData.slice(i, i + BATCH_SIZE);
                    
                    for (const c of chunk) {
                        const ref = db.collection('creatorRoster').doc(c.username);
                        batch.set(ref, {
                            cid: c.creatorId,
                            tiktokUsername: c.username,
                            email: c.email,
                            manager: c.manager,
                            claimed: c.claimed,
                            diamonds: String(c.diamonds),
                            hours: String(c.hours),
                            days: String(c.days),
                            tier: String(c.tier),
                            earned: String(c.earned),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    }
                    
                    await batch.commit();
                    log(`✅ Synced ${Math.min(i + BATCH_SIZE, creatorsData.length)}/${creatorsData.length}`);
                }
                
                log('🎉 Sync complete! Login should now work.', 'success');
                
            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

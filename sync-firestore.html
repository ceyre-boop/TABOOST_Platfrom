<!DOCTYPE html>
<html>
<head>
    <title>TABOOST - Sync to Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0044, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .btn {
            background: linear-gradient(135deg, #ff0044, #ff6b6b);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 20px 0;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .status.visible { display: block; }
        .success { color: #22c55e; }
        .error { color: #ff4444; }
        .warning {
            background: rgba(255,193,7,0.1);
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
        .warning strong { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TABOOST</div>
        <p style="color:#888; margin-bottom:30px;">Sync Creator Data to Firestore</p>
        
        <div class="warning">
            <strong>⚠️ Important:</strong><br>
            The sync tool needs to load data.js which may be blocked by CORS.<br>
            If this fails, use the alternative method below.
        </div>
        
        <button class="btn" id="syncBtn" onclick="startSync()">🔄 Try Auto Sync</button>
        
        <div style="margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px;">
            <h3 style="color: #feca57; margin-bottom: 15px;">Alternative: Manual CSV Upload</h3>
            <p style="color: #888; margin-bottom: 15px;">
                Drop your CSV here to sync creators to Firestore directly:
            </p>
            <div id="csvDrop" style="border: 2px dashed #444; border-radius: 10px; padding: 30px; cursor: pointer;">
                📁 Drop CSV file here
            </div>
            <input type="file" id="csvInput" accept=".csv" style="display:none">
        </div>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(msg, type) {
            const status = document.getElementById('status');
            status.classList.add('visible');
            const div = document.createElement('div');
            div.className = type || '';
            div.textContent = msg;
            status.appendChild(div);
            status.scrollTop = status.scrollHeight;
        }

        // CSV Drop handling
        const csvDrop = document.getElementById('csvDrop');
        const csvInput = document.getElementById('csvInput');
        
        csvDrop.onclick = () => csvInput.click();
        csvDrop.ondragover = (e) => { e.preventDefault(); csvDrop.style.borderColor = '#ff0044'; };
        csvDrop.ondragleave = () => { csvDrop.style.borderColor = '#444'; };
        csvDrop.ondrop = (e) => {
            e.preventDefault();
            csvDrop.style.borderColor = '#444';
            if (e.dataTransfer.files.length) processCSV(e.dataTransfer.files[0]);
        };
        csvInput.onchange = (e) => { if (e.target.files.length) processCSV(e.target.files[0]); };

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        async function processCSV(file) {
            log('📁 Reading CSV...');
            
            const text = await file.text();
            const lines = text.split('\n');
            const creators = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = parseCSVLine(line);
                if (cols.length < 3) continue;
                
                const cid = cols[1];
                const username = cols[2];
                let manager = cols[8] || 'carrington';
                if (manager.includes('+')) manager = manager.split('+')[0].trim();
                
                if (cid && username && !username.includes('@')) {
                    creators.push({
                        cid: cid,
                        username: username.toLowerCase(),
                        email: username.toLowerCase() + '@taboost.me',
                        manager: manager.toUpperCase(),
                        claimed: username.toLowerCase() === 'skylerclarkk',
                        diamonds: cols[19]?.replace(/,/g, '') || '0',
                        hours: cols[16] || '0',
                        days: cols[12] || '0',
                        tier: cols[21] || '',
                        earned: cols[33]?.replace(/,/g, '') || '0'
                    });
                }
            }
            
            log(`✅ Parsed ${creators.length} creators`);
            await syncToFirestore(creators);
        }

        async function syncToFirestore(creators) {
            log('🔄 Syncing to Firestore...');
            
            const BATCH_SIZE = 400;
            for (let i = 0; i < creators.length; i += BATCH_SIZE) {
                const batch = db.batch();
                const chunk = creators.slice(i, i + BATCH_SIZE);
                
                for (const c of chunk) {
                    const ref = db.collection('creatorRoster').doc(c.username);
                    batch.set(ref, {
                        cid: c.cid,
                        tiktokUsername: c.username,
                        email: c.email,
                        manager: c.manager,
                        claimed: c.claimed,
                        diamonds: c.diamonds,
                        hours: c.hours,
                        days: c.days,
                        tier: c.tier,
                        earned: c.earned,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
                
                await batch.commit();
                log(`✅ Synced ${Math.min(i + BATCH_SIZE, creators.length)}/${creators.length}`);
            }
            
            log('🎉 Sync complete! Login should now work.', 'success');
            document.getElementById('csvDrop').innerHTML = '✅ Sync Complete!';
        }

        async function startSync() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            
            log('🔄 Trying to load data.js...');
            
            try {
                // Try to fetch and parse data.js
                const response = await fetch('js/data.js?v=' + Date.now(), { 
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error('Cannot load data.js - CORS issue');
                }
                
                const scriptText = await response.text();
                
                // Extract creatorsData using regex
                const match = scriptText.match(/const creatorsData = (\[.*?\]);/s);
                if (!match) {
                    throw new Error('Could not parse creatorsData');
                }
                
                const creatorsData = JSON.parse(match[1]);
                log(`✅ Loaded ${creatorsData.length} creators from data.js`);
                
                // Convert to the format we need
                const creators = creatorsData.map(c => ({
                    cid: c.creatorId,
                    username: c.username,
                    email: c.email,
                    manager: c.manager,
                    claimed: c.claimed,
                    diamonds: String(c.diamonds),
                    hours: String(c.hours),
                    days: String(c.days),
                    tier: String(c.tier),
                    earned: String(c.earned)
                }));
                
                await syncToFirestore(creators);
                
            } catch (error) {
                log('❌ ' + error.message, 'error');
                log('💡 Use the CSV drop method below instead', 'warning');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

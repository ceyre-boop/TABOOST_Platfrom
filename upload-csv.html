        let creatorsToImport = [];

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileLabel').classList.add('has-file');
            document.getElementById('fileLabel').innerHTML = `
                <div style="font-size: 48px; margin-bottom: 10px;">✅</div>
                <div>${file.name}</div>
                <div style="color: #4ade80; font-size: 12px; margin-top: 5px;">${(file.size / 1024).toFixed(1)} KB</div>
            `;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                parseCSVContent(content);
            };
            reader.readAsText(file);
        }

        function parseCSVContent(content) {
            log('📊 Parsing CSV file...', 'info');
            
            const lines = content.split('\n');
            let totalInFile = 0;
            let alreadyHave = 0;
            creatorsToImport = [];
            
            // Skip header
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                totalInFile++;
                const cols = parseCSVLine(line);
                
                // CSV structure: rank, cid, username, status, level, month, discord, badge, agent, ...
                const cid = cols[1];
                const username = cols[2];
                let manager = cols[8] || 'carrington';
                
                // Clean manager name
                manager = manager.toString().split('+')[0].trim();
                if (!manager || manager.toLowerCase() === 'n/a') {
                    manager = 'carrington';
                }
                
                if (cid && username) {
                    if (ALREADY_IMPORTED.has(username.toLowerCase())) {
                        alreadyHave++;
                    } else {
                        creatorsToImport.push({
                            cid: cid,
                            username: username.toLowerCase(),
                            manager: manager.toLowerCase(),
                            claimed: username.toLowerCase() === 'skylerclarkk'
                        });
                    }
                }
            }
            
            document.getElementById('totalInFile').textContent = totalInFile;
            document.getElementById('alreadyImported').textContent = alreadyHave;
            document.getElementById('newToImport').textContent = creatorsToImport.length;
            document.getElementById('previewSection').classList.remove('hidden');
            
            log(`✅ File parsed: ${totalInFile} total, ${creatorsToImport.length} new, ${alreadyHave} already have`, 'success');
        }

        async function importBatch(startIndex, batchSize) {
            const batch = db.batch();
            const endIndex = Math.min(startIndex + batchSize, creatorsToImport.length);
            
            for (let i = startIndex; i < endIndex; i++) {
                const creator = creatorsToImport[i];
                const docRef = db.collection('creatorRoster').doc(creator.username);
                
                batch.set(docRef, {
                    cid: creator.cid,
                    tiktokUsername: creator.username,
                    claimed: creator.claimed || false,
                    manager: creator.manager.toUpperCase(),
                    importedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            await batch.commit();
            return endIndex - startIndex;
        }

        async function startImport() {
            if (creatorsToImport.length === 0) {
                log('❌ No new creators to import!', 'error');
                return;
            }

            document.getElementById('importBtn').disabled = true;
            log(`🚀 Starting import of ${creatorsToImport.length} creators...`, 'info');

            const BATCH_SIZE = 400;

            while (currentIndex < creatorsToImport.length) {
                try {
                    const imported = await importBatch(currentIndex, BATCH_SIZE);
                    importedCount += imported;
                    currentIndex += BATCH_SIZE;
                    
                    const percent = Math.round((currentIndex / creatorsToImport.length) * 100);
                    document.getElementById('progressBar').style.width = `${percent}%`;
                    document.getElementById('progressBar').textContent = `${percent}%`;
                    document.getElementById('importedCount').textContent = importedCount;
                    
                    log(`✅ Imported ${imported} (${currentIndex}/${creatorsToImport.length})`, 'success');
                    
                    await new Promise(r => setTimeout(r, 500));
                    
                } catch (error) {
                    log(`❌ Error: ${error.message}`, 'error');
                    currentIndex += BATCH_SIZE;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            log(`🎉 COMPLETE! Imported ${importedCount} creators`, 'success');
            document.getElementById('importBtn').disabled = false;
            document.getElementById('importBtn').textContent = '✅ IMPORT COMPLETE';
        }

        // Drag and drop
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('fileLabel').style.borderColor = '#feca57';
        });
        
        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            document.getElementById('fileLabel').style.borderColor = '#444';
        });
        
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('fileLabel').style.borderColor = '#444';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.csv')) {
                document.getElementById('csvFile').files = e.dataTransfer.files;
                handleFileSelect({ target: { files: [file] } });
            }
        });

        log('📋 Ready. Select a CSV file to begin.', 'info');
